<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVIAN(JONASH) // SINGULARITY</title>
    <style>
        :root {
            --space-black: #010003;
            --void-core: #000000;
            --void-purple: #1a0035;
            --cosmic-blue: #0077ff;
            --neon-cyan: #00f0ff;
            --neon-magenta: #d400ff;
            --font-display: 'Impact', 'Arial Black', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--space-black);
            font-family: var(--font-display);
            color: #fff;
        }

        /* --- IMMERSIVE SPACE BACKGROUND --- */
        .universe-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, var(--void-purple) 0%, var(--space-black) 100%);
            z-index: 1;
            overflow: hidden;
        }

        /* Erratic Cosmic Dust / Glitched Nebulae Particles */
        .cosmic-shards {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                radial-gradient(rgba(0, 240, 255, 0.15) 2px, transparent 2px),
                radial-gradient(rgba(212, 0, 255, 0.12) 3px, transparent 3px);
            background-size: 80px 80px, 130px 130px;
            animation: debrisDrift 25s linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        /* --- THE SUPERMASSIVE SPARKING BLACK HOLE --- */
        .black-hole-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85vmin; height: 85vmin;
            max-width: 600px; max-height: 600px;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1), filter 1.5s ease;
        }

        /* The Dead Void Core */
        .singularity-shadow {
            width: 42%; height: 42%;
            background: var(--void-core);
            border-radius: 50%;
            position: relative;
            z-index: 6;
            box-shadow: 
                0 0 40px #000, 
                inset 0 0 50px rgba(0,0,0,1),
                0 0 30px rgba(0, 240, 255, 0.4);
            animation: coreDistort 4s ease-in-out infinite alternate;
        }

        /* Accretion Ring 1: Violent Purple Swirl */
        .accretion-purple {
            position: absolute;
            width: 90%; height: 90%;
            border-radius: 45% 55% 50% 50% / 50% 45% 55% 50%;
            background: conic-gradient(from 0deg, transparent, var(--neon-magenta), transparent, rgba(0,0,0,0.8), var(--neon-magenta));
            filter: blur(8px);
            opacity: 0.8;
            animation: orbitalSpin 4s linear infinite;
            z-index: 4;
        }

        /* Accretion Ring 2: Fast-Spinning Neon Cyan Lightning Disk */
        .accretion-cyan {
            position: absolute;
            width: 105%; height: 105%;
            border-radius: 50%;
            border: 6px dotted var(--neon-cyan);
            filter: drop-shadow(0 0 25px var(--neon-cyan)) blur(1px);
            opacity: 0.7;
            animation: orbitalSpin 2s linear infinite reverse;
            z-index: 5;
        }

        /* Gravitational Lensing / Outer Reality Warping Ring */
        .gravitational-lens {
            position: absolute;
            width: 135%; height: 135%;
            border-radius: 53% 47% 55% 45% / 48% 52% 48% 52%;
            box-shadow: 
                0 0 60px 20px var(--cosmic-blue), 
                0 0 120px 40px var(--neon-magenta);
            filter: blur(20px);
            animation: lensWarp 6s ease-in-out infinite alternate;
            z-index: 3;
            pointer-events: none;
        }

        /* --- INTERFACE INFRASTRUCTURE --- */
        .viewport-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* --- STAGE 1: LOADING SCREEN --- */
        .loading-title {
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 25px;
            text-shadow: 0 0 20px var(--neon-cyan);
            text-align: center;
        }

        .bar-container {
            width: min(85vw, 480px);
            height: 16px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--cosmic-blue);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 119, 255, 0.4);
        }

        .bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--neon-magenta), var(--neon-cyan));
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: width 0.1s linear;
        }

        .percentage-display {
            font-family: monospace;
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-top: 15px;
            letter-spacing: 3px;
            text-align: center;
        }

        /* --- STAGE 2: CUSTOM SPLIT-TONE LOGO MENU --- */
        /* Recreated style from image: Left Purple, Right Cyan, Lightning middle break */
        .system-branding {
            font-size: clamp(2.3rem, 6.5vw, 5.5rem);
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: clamp(40px, 8vh, 70px);
            text-align: center;
            position: relative;
            display: inline-block;
            line-height: 1;
        }

        .system-branding .left-half {
            color: #fff;
            text-shadow: 
                3px 3px 0px #000,
                0 0 20px var(--neon-magenta),
                0 0 40px rgba(212, 0, 255, 0.6);
            padding-right: 2px;
        }

        .system-branding .right-half {
            color: #fff;
            text-shadow: 
                3px 3px 0px #000,
                0 0 20px var(--neon-cyan),
                0 0 40px rgba(0, 240, 255, 0.6);
            padding-left: 2px;
        }

        /* lightning bolt accent separator in text */
        .system-branding::after {
            content: '⚡';
            font-size: 0.8em;
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotate(15deg);
            color: #fff;
            text-shadow: 0 0 15px #fff, 0 0 30px var(--neon-cyan);
            opacity: 0.9;
        }

        .action-cluster {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: min(90vw, 380px);
        }

        .interactive-node {
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            border: 2px solid var(--cosmic-blue);
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-style: italic;
            text-transform: uppercase;
            padding: 15px;
            cursor: pointer;
            outline: none;
            transition: all 0.25s ease;
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            -webkit-tap-highlight-color: transparent;
        }

        .interactive-node:hover {
            color: #fff;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px var(--neon-cyan), inset 0 0 10px rgba(0, 240, 255, 0.3);
            transform: scale(1.06) rotate(-1deg);
        }

        /* --- STAGE 3: DATA TRANSMISSION CARD --- */
        .data-vault-panel {
            width: min(92vw, 800px);
            max-height: 85vh;
            background: rgba(1, 0, 3, 0.96);
            border: 3px solid var(--neon-cyan);
            box-shadow: 0 0 40px var(--cosmic-blue);
            padding: clamp(20px, 5vw, 40px);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }

        .vault-title {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-style: italic;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--neon-magenta);
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(0, 240, 255, 0.3);
            padding-bottom: 10px;
        }

        .vault-body {
            font-family: sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            line-height: 1.7;
            color: #e3daf0;
            margin-bottom: 30px;
            overflow-y: auto;
        }

        .vault-close-btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: #fff;
            padding: 12px 35px;
            font-family: var(--font-display);
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            align-self: center;
            width: min(100%, 260px);
        }

        .vault-close-btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        /* --- BLACK HOLE INTERACTION CONSUMING EFFECT --- */
        .event-horizon-collapse {
            transform: translate(-50%, -50%) scale(5.5) !important;
            filter: blur(12px) contrast(1.5);
        }

        .menu-spaghettify {
            transform: scale(0.5);
            filter: blur(25px);
            opacity: 0;
        }

        /* --- KINETIC SPACE ENGINE ANIMATIONS --- */
        @keyframes debrisDrift {
            0% { background-position: 0 0; }
            100% { background-position: 160px 160px; }
        }

        @keyframes orbitalSpin {
            100% { transform: rotate(360deg); }
        }

        /* Bending physics simulation on black hole core shape */
        @keyframes coreDistort {
            0% { border-radius: 50%; transform: scale(1); }
            100% { border-radius: 46% 54% 48% 52% / 52% 47% 53% 48%; transform: scale(1.05); }
        }

        @keyframes lensWarp {
            0% { transform: scale(1) rotate(0deg); border-radius: 53% 47% 55% 45% / 48% 52% 48% 52%; }
            100% { transform: scale(1.08) rotate(180deg); border-radius: 45% 55% 42% 58% / 50% 45% 55% 50%; }
        }
    </style>
</head>
<body>

    <div class="universe-bg">
        <div class="cosmic-shards"></div>
        <div class="black-hole-container" id="blackHole">
            <div class="gravitational-lens"></div>
            <div class="accretion-purple"></div>
            <div class="accretion-cyan"></div>
            <div class="singularity-shadow"></div>
        </div>
    </div>

    <div id="loaderStage" class="viewport-stage">
        <div class="loading-metrics">
            <h2 class="loading-title">Acquiring Target</h2>
            <div class="bar-container">
                <div class="bar-fill" id="progressBar"></div>
            </div>
            <div class="percentage-display" id="progressText">0%</div>
        </div>
    </div>

    <div id="menuStage" class="viewport-stage hidden">
        <h1 class="system-branding">
            <span class="left-half">VIVIAN</span><span class="right-half">(JONASH)</span>
        </h1>
        <div class="action-cluster">
            <button class="interactive-node" onclick="consumeAndDisplay('codm')">CODM</button>
            <button class="interactive-node" onclick="consumeAndDisplay('fnf')">FNF</button>
        </div>
    </div>

    <div id="vaultStage" class="viewport-stage hidden">
        <div class="data-vault-panel">
            <h2 class="vault-title" id="vaultHeader">DECRYPTING VECTOR...</h2>
            <div class="vault-body" id="vaultContent">
                [DATA CORRUPTION IN PROGRESS]
            </div>
            <button class="vault-close-btn" onclick="restoreSystemMenu()">[ ESCAPE SINGULARITY ]</button>
        </div>
    </div>

    <script>
        // Progressive Loading Sequence Engine
        window.addEventListener('DOMContentLoaded', () => {
            const barFill = document.getElementById('progressBar');
            const txtPercent = document.getElementById('progressText');
            let progress = 0;

            const systemBoot = setInterval(() => {
                progress += Math.floor(Math.random() * 5) + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(systemBoot);
                    
                    setTimeout(() => {
                        document.getElementById('loaderStage').classList.add('hidden');
                        document.getElementById('menuStage').classList.remove('hidden');
                    }, 400);
                }
                barFill.style.width = progress + "%";
                txtPercent.innerText = progress + "%";
            }, 50);
        });

        // The "Black Hole Swallowing You" Action
        function consumeAndDisplay(identity) {
            const blackHole = document.getElementById('blackHole');
            const menuStage = document.getElementById('menuStage');
            const vaultStage = document.getElementById('vaultStage');
            
            const vHeader = document.getElementById('vaultHeader');
            const vContent = document.getElementById('vaultContent');

            if (identity === 'codm') {
                vHeader.innerText = "CODM // CORE INFRASTRUCTURE";
                vContent.innerHTML = "<strong>SECTOR METRICS REPORT:</strong><br><br>• Anomaly designation matching local system constraints.<br>• Tactical telemetry coordinates pulled past critical entry curves.<br>• Weapon positioning matrices experiencing 100% signal dissipation within core threshold boundaries.";
            } else if (identity === 'fnf') {
                vHeader.innerText = "FNF // SINGULARITY HYPOTHESIS";
                vContent.innerHTML = "<strong>SPECTRUM ISOLATION FEED:</strong><br><br>• External rhythmic control sequence detected inside spatial tears.<br>• Directional vectors exhibiting chaotic speed shifts.<br>• Local acoustic wave pressure transformed entirely into localized dark matter density channels.";
            }

            // Fire consumption scale effect
            blackHole.classList.add('event-horizon-collapse');
            menuStage.classList.add('menu-spaghettify');

            // Swap displays when you hit the singularity point
            setTimeout(() => {
                menuStage.classList.add('hidden');
                vaultStage.classList.remove('hidden');
            }, 950);
        }

        // Return out of core pull state
        function restoreSystemMenu() {
            const blackHole = document.getElementById('blackHole');
            const menuStage = document.getElementById('menuStage');
            const vaultStage = document.getElementById('vaultStage');

            vaultStage.classList.add('hidden');
            menuStage.classList.remove('hidden');
            
            setTimeout(() => {
                blackHole.classList.remove('event-horizon-collapse');
                menuStage.classList.remove('menu-spaghettify');
            }, 50);
        }
    </script>
</body>
    </html>
