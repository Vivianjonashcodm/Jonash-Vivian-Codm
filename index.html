<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVIAN(JONASH) // ABSOLUTE VOID</title>
    <style>
        :root {
            --space-black: #010002;
            --void-core: #000000;
            --void-purple: rgba(126, 0, 255, 0.85);
            --deep-violet: rgba(43, 0, 84, 0.6);
            --neon-cyan: #00f0ff;
            --font-display: 'Impact', 'Arial Black', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--space-black);
            font-family: var(--font-display);
            color: #fff;
        }

        /* --- HARDWARE-ACCELERATED HIGH-PERFORMANCE BACKDROP --- */
        .universe-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #07010f 0%, var(--space-black) 100%);
            z-index: 1;
            overflow: hidden;
            transform: translateZ(0);
        }

        .starfield {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                radial-gradient(rgba(126, 0, 255, 0.04) 2px, transparent 2px);
            background-size: 80px 80px, 160px 160px;
            animation: cosmicDrift 120s linear infinite;
            z-index: 2;
            pointer-events: none;
            transform: translate3d(0,0,0);
        }

        /* --- STABLE REALISTIC PURPLE BLACK HOLE --- */
        .black-hole-viewport {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate3d(-50%, -50%, 0);
            width: 90vmin; height: 90vmin;
            max-width: 620px; max-height: 620px;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
        }

        /* Front-crossing flat accretion disk plane */
        .accretion-flat-disk {
            position: absolute;
            width: 115%; height: 22%;
            background: radial-gradient(ellipse at center, transparent 25%, var(--void-purple) 45%, var(--deep-violet) 65%, transparent 75%);
            transform: rotate(-6deg) translateZ(0);
            z-index: 5;
            opacity: 0.95;
            animation: diskChurn 5s ease-in-out infinite alternate;
        }

        /* Gravity Lensing Arc wrapping top to bottom behind the core shadow */
        .gravitational-lens-vertical {
            position: absolute;
            width: 76%; height: 76%;
            border-radius: 50%;
            border: 30px solid transparent;
            border-top: 40px solid var(--void-purple);
            border-bottom: 40px solid var(--deep-violet);
            transform: scaleY(1.12) rotate(-6deg) translateZ(0);
            z-index: 4;
            opacity: 0.9;
            box-shadow: inset 0 0 30px rgba(126, 0, 255, 0.3);
            animation: lensWobble 7s ease-in-out infinite alternate;
        }

        /* Perfect Pitch-Black Spherical Singularity Shadow Core */
        .shadow-core {
            width: 42%; height: 42%;
            background: var(--void-core);
            border-radius: 50%;
            z-index: 6;
            box-shadow: 0 0 30px #000, inset 0 0 40px #000;
        }

        /* --- STAGE CONFIGURATIONS --- */
        .viewport-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* --- STAGE 1: LOADING MATRIX --- */
        .loading-title {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(126,0,255,0.6);
        }

        .bar-container {
            width: min(85vw, 400px);
            height: 8px;
            background: rgba(0, 0, 0, 0.8);
            border: 1.5px solid var(--deep-violet);
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--deep-violet), var(--void-purple));
            box-shadow: 0 0 10px var(--void-purple);
            transition: width 0.1s linear;
        }

        .percentage-display {
            font-family: monospace;
            font-size: 1.5rem;
            margin-top: 15px;
            letter-spacing: 2px;
            color: #fff;
        }

        /* --- STAGE 2: TRANSPARENT LABEL BOX & TEXT BUTTONS --- */
        .system-branding {
            font-size: clamp(2.3rem, 6.5vw, 5.5rem);
            font-style: italic;
            text-transform: uppercase;
            margin-bottom: clamp(40px, 8vh, 70px);
            position: relative;
            display: inline-block;
            background: transparent; /* Transparent label box background */
            border: none;
            padding: 10px;
        }

        .system-branding .left-half {
            color: #fff;
            text-shadow: 3px 3px 0px #000, 0 0 20px rgba(126, 0, 255, 0.8);
            padding-right: 4px;
        }

        .system-branding .right-half {
            color: #fff;
            text-shadow: 3px 3px 0px #000, 0 0 20px var(--neon-cyan);
            padding-left: 4px;
        }

        .system-branding::after {
            content: '⚡';
            font-size: 0.8em;
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotate(12deg);
            color: #fff;
            text-shadow: 0 0 15px #fff, 0 0 20px var(--neon-cyan);
        }

        .action-cluster {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: min(90vw, 360px);
        }

        /* Completely Transparent Text Button Configuration */
        .interactive-node {
            background: transparent; /* Completely transparent backdrop */
            color: #fff;
            border: none;
            font-family: var(--font-display);
            font-size: clamp(2rem, 4.5vw, 2.6rem);
            font-style: italic;
            text-transform: uppercase;
            padding: 12px 20px;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            text-shadow: 0 0 10px rgba(126, 0, 255, 0.4);
            -webkit-tap-highlight-color: transparent;
        }

        /* Flanking side singularities */
        .node-singularity {
            width: 12px; height: 12px;
            background: #000;
            border-radius: 50%;
            box-shadow: 0 0 10px 3px var(--void-purple), 0 0 18px 5px var(--deep-violet);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            transform: translateZ(0);
        }

        .interactive-node:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 12px var(--neon-cyan);
            transform: scale(1.05);
        }

        .interactive-node:hover .node-singularity {
            box-shadow: 0 0 12px 5px var(--neon-cyan), 0 0 20px 7px #0077ff;
            transform: scale(1.25);
        }

        /* --- STAGE 3: UNKNOWN SPACE DATA INTERFACE --- */
        .multiverse-grid {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 2;
            pointer-events: none;
            display: flex;
            justify-content: space-around;
            align-items: center;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .multiverse-active { opacity: 1 !important; }

        .mini-singularity {
            position: absolute;
            width: 25vmin; height: 25vmin;
            background: #000;
            border-radius: 50%;
            box-shadow: 0 0 25px var(--void-purple), 0 0 50px var(--deep-violet);
            animation: targetFloat 12s ease-in-out infinite alternate;
            transform: translateZ(0);
        }

        .data-vault-panel {
            width: min(92vw, 740px);
            background: rgba(1, 0, 3, 0.95);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.15);
            padding: clamp(20px, 5vw, 40px);
            border-radius: 6px;
            z-index: 15;
            display: flex;
            flex-direction: column;
        }

        .vault-title {
            font-size: clamp(1.6rem, 4vw, 2.5rem);
            font-style: italic;
            text-transform: uppercase;
            text-shadow: 0 0 12px var(--void-purple);
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(255,255,255,0.15);
            padding-bottom: 10px;
        }

        .vault-body {
            font-family: sans-serif;
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            line-height: 1.6;
            color: #cebfde;
            margin-bottom: 30px;
        }

        .vault-close-btn {
            background: transparent;
            border: 2px solid var(--void-purple);
            color: #fff;
            padding: 10px 25px;
            font-family: var(--font-display);
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            align-self: center;
        }

        .vault-close-btn:hover {
            background: var(--void-purple);
            box-shadow: 0 0 15px var(--void-purple);
        }

        /* --- CINEMATIC TRANSITIONS --- */
        .swallowed-by-singularity {
            transform: translate3d(-50%, -50%, 0) scale(7.5) !important;
            opacity: 0.05;
        }

        .menu-spaghettify {
            transform: scale(0.5);
            opacity: 0;
        }

        /* --- HARDWARE-OPTIMIZED ANIMATIONS --- */
        @keyframes cosmicDrift {
            0% { transform: translate3d(0,0,0); }
            100% { transform: translate3d(-40px, -40px, 0); }
        }

        @keyframes diskChurn {
            0% { transform: rotate(-6deg) scaleY(1); }
            100% { transform: rotate(-4deg) scaleY(1.05); }
        }

        @keyframes lensWobble {
            0% { transform: scaleY(1.12) rotate(-6deg); }
            100% { transform: scaleY(1.16) rotate(-4deg); }
        }

        @keyframes targetFloat {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-10px, -20px, 0); }
        }
    </style>
</head>
<body>

    <div class="universe-bg">
        <div class="starfield"></div>
        
        <div class="black-hole-viewport" id="mainBlackHole">
            <div class="gravitational-lens-vertical"></div>
            <div class="accretion-flat-disk"></div>
            <div class="shadow-core"></div>
        </div>

        <div class="multiverse-grid" id="multiverseField">
            <div class="mini-singularity" style="top: 15%; left: 8%; animation-delay: 0s; width: 14vmin; height: 14vmin;"></div>
            <div class="mini-singularity" style="top: 68%; left: 12%; animation-delay: -2s; width: 25vmin; height: 25vmin;"></div>
            <div class="mini-singularity" style="top: 18%; right: 10%; animation-delay: -4s; width: 20vmin; height: 20vmin;"></div>
            <div class="mini-singularity" style="top: 64%; right: 6%; animation-delay: -1s; width: 16vmin; height: 16vmin;"></div>
        </div>
    </div>

    <div id="loaderStage" class="viewport-stage">
        <h2 class="loading-title">Stabilizing Orbit</h2>
        <div class="bar-container">
            <div class="bar-fill" id="progressBar"></div>
        </div>
        <div class="percentage-display" id="progressText">0%</div>
    </div>

    <div id="menuStage" class="viewport-stage hidden">
        <h1 class="system-branding">
            <span class="left-half">VIVIAN</span><span class="right-half">(JONASH)</span>
        </h1>
        <div class="action-cluster">
            <button class="interactive-node" onclick="swallowSequence('codm')">
                <div class="node-singularity"></div>
                <span>CODM</span>
                <div class="node-singularity"></div>
            </button>
            <button class="interactive-node" onclick="swallowSequence('fnf')">
                <div class="node-singularity"></div>
                <span>FNF</span>
                <div class="node-singularity"></div>
            </button>
        </div>
    </div>

    <div id="vaultStage" class="viewport-stage hidden">
        <div class="data-vault-panel">
            <h2 class="vault-title" id="vaultHeader">UNKNOWN PLANE RECORD</h2>
            <div class="vault-body" id="vaultContent">[SYNCHRONIZING...]</div>
            <button class="vault-close-btn" onclick="restoreFromUnknown()">[ ESCAPE MULTIVERSE ]</button>
        </div>
    </div>

    <script>
        // Loading Tracking Routine
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progressBar');
            const txt = document.getElementById('progressText');
            let count = 0;

            const trackingLoop = setInterval(() => {
                count += Math.floor(Math.random() * 6) + 3;
                if (count >= 100) {
                    count = 100;
                    clearInterval(trackingLoop);
                    setTimeout(() => {
                        document.getElementById('loaderStage').classList.add('hidden');
                        document.getElementById('menuStage').classList.remove('hidden');
                    }, 350);
                }
                bar.style.width = count + "%";
                txt.innerText = count + "%";
            }, 30);
        });

        // Cinematic Swallow / Multiverse Shift Sequence
        function swallowSequence(gameId) {
            const bh = document.getElementById('mainBlackHole');
            const menu = document.getElementById('menuStage');
            const vault = document.getElementById('vaultStage');
            const fields = document.getElementById('multiverseField');
            
            const head = document.getElementById('vaultHeader');
            const body = document.getElementById('vaultContent');

            if (gameId === 'codm') {
                head.innerText = "CODM // SUB-SPACE METRICS";
                body.innerHTML = "Isolated profile information successfully transmitted past the main accretion barrier. Core targeting tracking coordinates remain locked inside processing matrices.";
            } else if (gameId === 'fnf') {
                head.innerText = "FNF // FREQUENCY FRAGMENT";
                body.innerHTML = "Acoustic control structures translated into non-linear vector frames. Local audio spectrum coordinates are currently maintaining stability within background tears.";
            }

            bh.classList.add('swallowed-by-singularity');
            menu.classList.add('menu-spaghettify');

            setTimeout(() => {
                menu.classList.add('hidden');
                bh.classList.add('hidden');
                
                vault.classList.remove('hidden');
                fields.classList.add('multiverse-active');
            }, 600);
        }

        // Return Matrix Sequence
        function restoreFromUnknown() {
            const bh = document.getElementById('mainBlackHole');
            const menu = document.getElementById('menuStage');
            const vault = document.getElementById('vaultStage');
            const fields = document.getElementById('multiverseField');

            vault.classList.add('hidden');
            fields.classList.remove('multiverse-active');
            
            bh.classList.remove('hidden');
            menu.classList.remove('hidden');

            setTimeout(() => {
                bh.classList.remove('swallowed-by-singularity');
                menu.classList.remove('menu-spaghettify');
            }, 30);
        }
    </script>
</body>
            </html>
