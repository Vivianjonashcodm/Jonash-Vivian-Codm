<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINGULARITY // EVENT HORIZON</title>
    <style>
        :root {
            --space-black: #020105;
            --singularity-purple: #12012c;
            --nebula-glow: #3a0066;
            --accretion-disk: #7e00ff;
            --hawking-radiation: #cc00ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--space-black);
            font-family: 'Cinzel', 'Times New Roman', serif;
            color: #ece6f2;
        }

        /* --- THE INFINITE COSMIC VOID BACKGROUND --- */
        .deep-space {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--singularity-purple) 0%, var(--space-black) 100%);
            z-index: 1;
            overflow: hidden;
        }

        /* Swirling Cosmic Gas Overlays */
        .nebula-cloud {
            position: absolute;
            width: 250%;
            height: 250%;
            top: -75%; left: -75%;
            background: radial-gradient(ellipse at center, rgba(126, 0, 255, 0.08) 0%, rgba(58, 0, 102, 0.04) 40%, transparent 70%);
            filter: blur(60px);
            animation: diskRotation 45s linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        /* --- SCREEN FRAMEWORK --- */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1.8s cubic-bezier(0.25, 1, 0.5, 1), transform 2s cubic-bezier(0.25, 1, 0.5, 1), filter 1.8s ease;
        }

        .spaghettified {
            opacity: 0;
            pointer-events: none;
            transform: scale(0) rotate(720deg); /* Pulled violently into the center */
            filter: blur(30px);
        }

        /* --- SCREEN 1: THE ACCRETION DISK ENTRANCE --- */
        #entranceScreen {
            cursor: pointer;
        }

        /* Highly distorted black hole visual effect */
        .black-hole-core {
            position: relative;
            width: 260px;
            height: 260px;
            background: #000000;
            border-radius: 50%;
            box-shadow: 
                0 0 40px 10px #000,
                inset 0 0 50px rgba(0,0,0,1),
                0 0 70px 25px var(--accretion-disk),
                0 0 140px 50px var(--nebula-glow);
            animation: spaceWarp 8s ease-in-out infinite alternate;
            margin-bottom: 50px;
        }

        /* Einstein Ring / Gravitational Lens Distortion */
        .black-hole-core::before {
            content: '';
            position: absolute;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            border-radius: 50%;
            border: 1px solid rgba(204, 0, 255, 0.3);
            box-shadow: 0 0 30px rgba(126, 0, 255, 0.2);
            animation: diskRotation 15s linear infinite;
        }

        /* Whispering calling text */
        .singularity-call {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 15px;
            text-transform: uppercase;
            color: #fff;
            opacity: 0.6;
            animation: pulseRadiation 4s ease-in-out infinite;
            text-align: center;
        }

        /* --- SCREEN 2: EVENT HORIZON INTERIOR --- */
        .horizon-manifesto {
            max-width: 700px;
            text-align: center;
            padding: 20px;
        }

        .horizon-title {
            font-size: 3.5rem;
            font-weight: 200;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 50px;
            text-shadow: 0 0 30px var(--hawking-radiation);
        }

        /* Gravitational anomalies representing website sections */
        .gravitational-anomalies {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .anomaly-node {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            color: #8c7b9c;
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            padding: 20px 30px;
            position: relative;
            transition: color 0.5s ease, transform 0.5s ease;
        }

        /* Floating dark orb background for individual links */
        .anomaly-node::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: var(--accretion-disk);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            opacity: 0;
            filter: blur(10px);
            transition: all 0.5s ease;
        }

        .anomaly-node:hover {
            color: #ffffff;
            transform: translateY(-5px) scale(1.05);
        }

        .anomaly-node:hover::before {
            width: 130%;
            height: 130%;
            opacity: 0.15;
            filter: blur(15px);
            box-shadow: 0 0 30px var(--hawking-radiation);
        }

        /* --- SCREEN 3: DEEPEST LAYER CONTENT --- */
        .collapsed-content {
            font-size: 1.3rem;
            line-height: 2.2;
            letter-spacing: 3px;
            color: #bfaecf;
            max-width: 600px;
            margin-bottom: 60px;
            text-align: center;
            animation: internalDrift 6s ease-in-out infinite;
        }

        .dissolve-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.3s ease, letter-spacing 0.3s ease;
        }

        .dissolve-btn:hover {
            opacity: 0.9;
            letter-spacing: 9px;
        }

        /* --- COSMIC PHYSICS ANIMATIONS --- */
        @keyframes diskRotation {
            100% { transform: rotate(360deg); }
        }

        /* Simulates gravity bending light and shape */
        @keyframes spaceWarp {
            0% {
                transform: scale(1) rotate(0deg);
                border-radius: 50%;
            }
            50% {
                transform: scale(1.06) rotate(180deg);
                border-radius: 46% 54% 42% 58% / 50% 44% 56% 50%; /* Dynamic lopsided deformation */
                box-shadow: 
                    0 0 50px #000,
                    0 0 90px 35px var(--accretion-disk),
                    0 0 180px 70px var(--nebula-glow);
            }
            100% {
                transform: scale(0.97) rotate(360deg);
                border-radius: 52% 48% 57% 43% / 45% 53% 47% 55%;
            }
        }

        @keyframes pulseRadiation {
            0%, 100% { opacity: 0.3; filter: blur(1px); }
            50% { opacity: 0.75; filter: blur(0px); }
        }

        @keyframes internalDrift {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(0.5deg); }
        }
    </style>
</head>
<body>

    <div class="deep-space">
        <div class="nebula-cloud"></div>
    </div>

    <!-- 1. THE SINGULARITY CORE ENTRANCE -->
    <div id="entranceScreen" class="screen" onclick="pullToCenter()">
        <div class="black-hole-core"></div>
        <div class="singularity-call">Cross the Event Horizon</div>
    </div>

    <!-- 2. THE INTERNAL EVENT HORIZON MENU -->
    <div id="horizonMenu" class="screen spaghettified">
        <div class="horizon-manifesto">
            <h1 class="horizon-title">The Singularity</h1>
            
            <div class="gravitational-anomalies">
                <button class="anomaly-node" onclick="collapseIntoData('void')">The Abyss</button>
                <button class="anomaly-node" onclick="collapseIntoData('matter')">Crushed Matter</button>
                <button class="anomaly-node" onclick="collapseIntoData('time')">Time Dilation</button>
            </div>
        </div>
    </div>

    <!-- 3. DEEPEST CONTENT LAYER -->
    <div id="insideContent" class="screen spaghettified">
        <div class="horizon-manifesto">
            <p class="collapsed-content" id="manifestText">...</p>
            <button class="dissolve-btn" onclick="returnToHorizon()">[ Orbit Back ]</button>
        </div>
    </div>

    <script>
        // Transition sequences simulating massive gravity pulls
        function pullToCenter() {
            document.getElementById('entranceScreen').classList.add('spaghettified');
            document.getElementById('horizonMenu').classList.remove('spaghettified');
        }

        function collapseIntoData(dimension) {
            document.getElementById('horizonMenu').classList.add('spaghettified');
            const targetScreen = document.getElementById('insideContent');
            const targetText = document.getElementById('manifestText');
            
            targetScreen.classList.remove('spaghettified');

            if (dimension === 'void') {
                targetText.innerHTML = "At the geometric center, density reaches infinity. The conventional grid architecture of standard markup is completely shredded. Here lies the absolute core—silent, infinite, and perfectly empty.";
            } else if (dimension === 'matter') {
                targetText.innerHTML = "Subatomic systems compressed past their boundaries. Everything that once formed structure has disintegrated into foundational elements, floating aimlessly around a dark mass.";
            } else {
                targetText.innerHTML = "Light takes infinite duration to cross coordinates. From an exterior metric, actions stop completely. You are frozen on the inner boundary threshold of a collapsing star.";
            }
        }

        function returnToHorizon() {
            document.getElementById('insideContent').classList.add('spaghettified');
            document.getElementById('horizonMenu').classList.remove('spaghettified');
        }
    </script>
</body>
</html>
