<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SINGULARITY // ARCHIVE</title>
    <style>
        :root {
            --space-black: #020106;
            --void-core: #000000;
            --accretion-purple: #1b003a;
            --neon-magenta: #e100ff;
            --neon-violet: #6200ff;
            --text-glow: #f3e6ff;
            --font-display: 'Impact', 'Arial Black', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--space-black);
            font-family: var(--font-display);
            color: #fff;
        }

        /* --- IMMERSIVE SPACE ENVIRONMENT --- */
        .universe-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, var(--accretion-purple) 0%, var(--space-black) 100%);
            z-index: 1;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Twinkling Starfield and Cosmic Dust */
        .cosmic-dust {
            position: absolute;
            width: 300%; height: 300%;
            top: -100%; left: -100%;
            background-image: 
                radial-gradient(rgba(225, 0, 255, 0.15) 2px, transparent 2px),
                radial-gradient(rgba(98, 0, 255, 0.1) 1px, transparent 1px);
            background-size: 100px 100px, 60px 60px;
            animation: cosmicDrift 40s linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        /* --- THE SUPERMASSIVE BLACK HOLE --- */
        .black-hole-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vmin; height: 80vmin; /* Keeps it perfectly scalable on mobile vs 4K desktop */
            max-width: 650px; max-height: 650px;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1), filter 1.5s ease;
        }

        .singularity-shadow {
            width: 45%; height: 45%;
            background: var(--void-core);
            border-radius: 50%;
            position: relative;
            z-index: 5;
            box-shadow: 0 0 40px #000, inset 0 0 30px #000;
        }

        /* Swirling Accretion Disk Ring */
        .accretion-disk {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--neon-violet), var(--neon-magenta), transparent, var(--neon-violet), transparent);
            filter: blur(15px);
            opacity: 0.75;
            animation: orbitalSpin 6s linear infinite;
            z-index: 4;
        }

        /* Gravitational Lensing / Einstein Ring Distortion Glow */
        .gravitational-lens {
            position: absolute;
            width: 130%; height: 130%;
            border-radius: 50%;
            box-shadow: 0 0 80px 20px var(--neon-violet), 0 0 150px 40px rgba(225, 0, 255, 0.4);
            animation: pulseHorizon 3s ease-in-out infinite alternate;
            z-index: 3;
            pointer-events: none;
        }

        /* --- INTERFACE INFRASTRUCTURE --- */
        .viewport-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* --- STAGE 1: LOADING TIMELINE --- */
        .loading-metrics {
            text-align: center;
            z-index: 15;
        }

        .loading-title {
            font-size: clamp(2rem, 5vw, 4.5rem);
            font-style: italic;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            margin-bottom: 20px;
        }

        .bar-container {
            width: min(80vw, 450px);
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-violet);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(98, 0, 255, 0.3);
            margin: 0 auto;
        }

        .bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--neon-violet), var(--neon-magenta));
            box-shadow: 0 0 10px var(--neon-magenta);
            transition: width 0.1s linear;
        }

        .percentage-display {
            font-family: monospace;
            font-size: 1.5rem;
            color: var(--neon-magenta);
            margin-top: 15px;
            letter-spacing: 2px;
        }

        /* --- STAGE 2: MASSIVE COMPUTER/MOBILE MENU --- */
        .system-branding {
            font-size: clamp(2.5rem, 7vw, 6rem);
            font-style: italic;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px var(--neon-magenta), -2px -2px 0px var(--neon-violet);
            margin-bottom: clamp(30px, 8vh, 60px);
            text-align: center;
        }

        .action-cluster {
            display: flex;
            flex-direction: column;
            gap: clamp(15px, 3vh, 25px);
            width: min(90vw, 400px);
        }

        .interactive-node {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 2px solid var(--neon-violet);
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-style: italic;
            text-transform: uppercase;
            padding: clamp(12px, 2.5vh, 20px);
            cursor: pointer;
            outline: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border-radius: 8px;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .interactive-node:hover {
            color: var(--neon-magenta);
            border-color: var(--neon-magenta);
            background: var(--void-core);
            box-shadow: 0 0 25px var(--neon-magenta);
            transform: scale(1.05) translateY(-3px);
        }

        .interactive-node:active {
            transform: scale(0.98);
        }

        /* --- STAGE 3: INFOPANEL VAULT --- */
        .data-vault-panel {
            width: min(92vw, 850px);
            max-height: 85vh;
            background: rgba(2, 1, 6, 0.95);
            border: 3px solid var(--neon-magenta);
            box-shadow: 0 0 50px rgba(98, 0, 255, 0.5);
            padding: clamp(20px, 5vw, 45px);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .vault-title {
            font-size: clamp(1.8rem, 4vw, 3.2rem);
            font-style: italic;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px var(--neon-violet);
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(225, 0, 255, 0.2);
            padding-bottom: 10px;
        }

        .vault-body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: clamp(0.95rem, 2.5vw, 1.15rem);
            line-height: 1.7;
            color: #d8cce4;
            margin-bottom: 30px;
            overflow-y: auto;
        }

        .vault-close-btn {
            background: var(--neon-violet);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-family: var(--font-display);
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            align-self: center;
            border-radius: 6px;
            transition: background 0.2s, box-shadow 0.2s;
            width: min(100%, 250px);
        }

        .vault-close-btn:hover {
            background: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta);
        }

        /* --- INTERACTIVE ANIMATION ACTIONS (THE CONSUMING EFFECT) --- */
        /* Triggered via JS when a button is clicked to simulate falling in */
        .event-horizon-collapse {
            transform: translate(-50%, -50%) scale(5) !important; /* Zooms blackhole out to cover viewport */
            filter: blur(15px) hue-rotate(90deg);
        }

        .menu-spaghettify {
            transform: scale(0.6);
            filter: blur(20px);
            opacity: 0;
        }

        /* --- PROCEDURAL SPACE KINETICS --- */
        @keyframes cosmicDrift {
            0% { transform: rotate(0deg) translate(0, 0); }
            100% { transform: rotate(8deg) translate(50px, 50px); }
        }

        @keyframes orbitalSpin {
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseHorizon {
            0% { transform: scale(1); filter: blur(15px); }
            100% { transform: scale(1.05); filter: blur(25px); }
        }
    </style>
</head>
<body>

    <!-- Deep Cosmic Backdrop Environment -->
    <div class="universe-bg">
        <div class="cosmic-dust"></div>
        <div class="black-hole-container" id="blackHole">
            <div class="gravitational-lens"></div>
            <div class="accretion-disk"></div>
            <div class="singularity-shadow"></div>
        </div>
    </div>

    <!-- STAGE 1: EVENT HORIZON CALIBRATION LOADER -->
    <div id="loaderStage" class="viewport-stage">
        <div class="loading-metrics">
            <h2 class="loading-title">Approaching Singularity</h2>
            <div class="bar-container">
                <div class="bar-fill" id="progressBar"></div>
            </div>
            <div class="percentage-display" id="progressText">0%</div>
        </div>
    </div>

    <!-- STAGE 2: RESPONSIVE INTERACTIVE CORE MENU -->
    <div id="menuStage" class="viewport-stage hidden">
        <h1 class="system-branding">EVENT HORIZON</h1>
        <div class="action-cluster">
            <button class="interactive-node" onclick="consumeAndDisplay('codm')">CODM</button>
            <button class="interactive-node" onclick="consumeAndDisplay('fnf')">FNF</button>
        </div>
    </div>

    <!-- STAGE 3: EXPANDED TRANSMISSION STORAGE -->
    <div id="vaultStage" class="viewport-stage hidden">
        <div class="data-vault-panel">
            <h2 class="vault-title" id="vaultHeader">TRANSMISSION OVERRIDE</h2>
            <div class="vault-body" id="vaultContent">
                [PLACEHOLDER DATA UNIT]
            </div>
            <button class="vault-close-btn" onclick="restoreSystemMenu()">[ ESCAPE ORBIT ]</button>
        </div>
    </div>

    <script>
        // Progressive Loading Handler
        window.addEventListener('DOMContentLoaded', () => {
            const barFill = document.getElementById('progressBar');
            const txtPercent = document.getElementById('progressText');
            let progress = 0;

            const trackingEngine = setInterval(() => {
                progress += Math.floor(Math.random() * 6) + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(trackingEngine);
                    
                    setTimeout(() => {
                        document.getElementById('loaderStage').classList.add('hidden');
                        document.getElementById('menuStage').classList.remove('hidden');
                    }, 400);
                }
                barFill.style.width = progress + "%";
                txtPercent.innerText = progress + "%";
            }, 60);
        });

        // The "Black Hole Eating You" Animation Sequence
        function consumeAndDisplay(identity) {
            const blackHole = document.getElementById('blackHole');
            const menuStage = document.getElementById('menuStage');
            const vaultStage = document.getElementById('vaultStage');
            
            const vHeader = document.getElementById('vaultHeader');
            const vContent = document.getElementById('vaultContent');

            // Set content data parameters
            if (identity === 'codm') {
                vHeader.innerText = "CODM // INVERSION DECRYPTION";
                vContent.innerHTML = "<strong>EVENT_HORIZON_LOG_A:</strong><br><br>Target database anomalies located in combat networks. Local tactical metrics show high density space-time warping. Weapon tracking units are failing due to heavy gravity-well pull.";
            } else if (identity === 'fnf') {
                vHeader.innerText = "FNF // ACOUSTIC ENTROPY";
                vContent.innerHTML = "<strong>EVENT_HORIZON_LOG_B:</strong><br><br>Audio tracking feeds hijacked by cosmic rhythm architecture. Directional tracking indicators are breaking down into dark energetic clusters. Sound parameters display zero localized stabilization.";
            }

            // Fire the consumption screen layout actions
            blackHole.classList.add('event-horizon-collapse');
            menuStage.classList.add('menu-spaghettify');

            // Reveal the info window after you fall completely through the black hole
            setTimeout(() => {
                menuStage.classList.add('hidden');
                vaultStage.classList.remove('hidden');
            }, 900);
        }

        // Return from content pane back out to the main event loop
        function restoreSystemMenu() {
            const blackHole = document.getElementById('blackHole');
            const menuStage = document.getElementById('menuStage');
            const vaultStage = document.getElementById('vaultStage');

            vaultStage.classList.add('hidden');
            menuStage.classList.remove('hidden');
            
            // Reverse the consumption expansion
            setTimeout(() => {
                blackHole.classList.remove('event-horizon-collapse');
                menuStage.classList.remove('menu-spaghettify');
            }, 50);
        }
    </script>
</body>
</html>
