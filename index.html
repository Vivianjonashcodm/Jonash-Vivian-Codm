<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕳️</title>
    <style>
        :root {
            --abyss: #010103;
            --distortion: rgba(160, 0, 255, 0.15);
            --decay: #504060;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--abyss);
            font-family: 'Georgia', serif; /* Less technical, more atmospheric */
            color: #d1cbd6;
        }

        /* --- THE CONSTANT ABYSS BACKGROUND --- */
        .void-universe {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #090514 0%, var(--abyss) 100%);
            z-index: 1;
        }

        /* Swirling visual distortions */
        .nebula-distortion {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%; left: -50%;
            background: radial-gradient(ellipse at center, var(--distortion) 0%, transparent 60%);
            filter: blur(40px);
            animation: cosmicSwirl 25s linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        /* --- SCREENS --- */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1), filter 1.5s ease;
        }

        .shrouded {
            opacity: 0;
            pointer-events: none;
            filter: blur(20px);
        }

        /* --- THE TRUE VOID ENTRANCE --- */
        #entranceScreen {
            cursor: pointer;
        }

        /* An unsettling, warping singularity core */
        .anomaly-core {
            position: relative;
            width: 180px;
            height: 180px;
            background: #000;
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%; /* Organic distortion */
            box-shadow: 
                0 0 40px #000,
                inset 0 0 20px rgba(0,0,0,1),
                0 0 50px 10px rgba(70, 0, 130, 0.4);
            animation: warpCore 6s ease-in-out infinite alternate;
            margin-bottom: 60px;
        }

        /* Whispering text */
        .void-whisper {
            font-size: 2.2rem;
            font-style: italic;
            letter-spacing: 12px;
            color: #fff;
            opacity: 0.8;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            animation: fadeWhisper 4s ease-in-out infinite;
            text-align: center;
        }

        /* --- THE INSIDE OF THE WEBSITE --- */
        .abyssal-gate {
            max-width: 650px;
            text-align: center;
            padding: 20px;
        }

        .manifest-title {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 6px;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 0 25px rgba(147, 112, 219, 0.3);
        }

        /* Floating chunks of the website floating in space */
        .abyss-fragments {
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-top: 50px;
        }

        .fragment {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            color: var(--decay);
            font-size: 1.8rem;
            font-style: italic;
            cursor: pointer;
            transition: color 0.4s ease, transform 0.4s ease, text-shadow 0.4s ease;
        }

        .fragment:hover {
            color: #fff;
            transform: scale(1.05) translateY(-2px);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(147, 112, 219, 0.5);
        }

        /* Deep Interior content text */
        .echo-manifesto {
            font-size: 1.1rem;
            line-height: 2;
            letter-spacing: 2px;
            color: #a49ba9;
            max-width: 500px;
            margin: 0 auto 50px auto;
            animation: floatWhisper 6s ease-in-out infinite;
        }

        /* --- ANIMATIONS --- */
        @keyframes cosmicSwirl {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes warpCore {
            0% {
                transform: scale(1) rotate(0deg);
                border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            }
            50% {
                transform: scale(1.15) rotate(180deg);
                border-radius: 40% 60% 35% 65% / 40% 65% 35% 60%;
                box-shadow: 0 0 70px 20px rgba(90, 0, 180, 0.5);
            }
            100% {
                transform: scale(0.95) rotate(360deg);
                border-radius: 50% 50% 60% 40% / 55% 35% 65% 45%;
            }
        }

        @keyframes fadeWhisper {
            0%, 100% { opacity: 0.3; filter: blur(1px); }
            50% { opacity: 0.8; filter: blur(0px); }
        }

        @keyframes floatWhisper {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

    <div class="void-universe"></div>
    <div class="nebula-distortion"></div>

    <!-- 1. ENTRANCE SCREEN (THE SINGULARITY ANOMALY) -->
    <div id="entranceScreen" class="screen" onclick="descend()">
        <div class="anomaly-core"></div>
        <div class="void-whisper">sink into the nothingness</div>
    </div>

    <!-- 2. THE INSIDE (MAIN INTERIOR GATE) -->
    <div id="interiorMenu" class="screen shrouded">
        <div class="abyssal-gate">
            <h1 class="manifest-title">The Deep</h1>
            
            <div class="abyss-fragments">
                <button class="fragment" onclick="manifestEcho('abyss')">Echos of Nada</button>
                <button class="fragment" onclick="manifestEcho('horizon')">Event Horizon</button>
                <button class="fragment" onclick="manifestEcho('oblivion')">Total Oblivion</button>
            </div>
        </div>
    </div>

    <!-- 3. DEEPER INSIDE INSIDE THE WEBSITE CONTENT PAGES -->
    <div id="contentManifest" class="screen shrouded">
        <div class="abyssal-gate">
            <p class="echo-manifesto" id="echoText">...</p>
            <button class="fragment" style="font-size: 1.1rem; color: #fff;" onclick="ascendToGate()">[ Dissolve Back ]</button>
        </div>
    </div>

    <script>
        // Smooth scene sequence controller
        function descend() {
            document.getElementById('entranceScreen').classList.add('shrouded');
            document.getElementById('interiorMenu').classList.remove('shrouded');
        }

        function manifestEcho(type) {
            document.getElementById('interiorMenu').classList.add('shrouded');
            const target = document.getElementById('contentManifest');
            const textElement = document.getElementById('echoText');
            
            target.classList.remove('shrouded');

            if (type === 'abyss') {
                textElement.innerHTML = "“There is no time here. Matter breaks down. The memory of light ceases to exist. You have bypassed existence itself, stumbling upon a dead vacuum where structural websites mean nothing.”";
            } else if (type === 'horizon') {
                textElement.innerHTML = "“Everything pulled down to this depth stays here forever. Light loops eternally around the center gravity point. Your awareness is drifting into a quiet, infinite stretching of coordinates.”";
            } else {
                textElement.innerHTML = "“Silence. Pure emptiness. The structural framework has completely faded out. You are viewing a localized collapse.”";
            }
        }

        function ascendToGate() {
            document.getElementById('contentManifest').classList.add('shrouded');
            document.getElementById('interiorMenu').classList.remove('shrouded');
        }
    </script>
</body>
</html>
