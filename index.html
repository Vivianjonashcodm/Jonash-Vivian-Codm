<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call of Duty: Mobile Hub | Premium Fan Portal</title>
    <style>
        /* --- DESIGN SYSTEM & CSS VARIABLES --- */
        :root {
            --bg-deep: #050608;
            --bg-main: #0b0c10;
            --bg-card: rgba(18, 24, 33, 0.75);
            --bg-glass: rgba(20, 27, 38, 0.6);
            --border-glass: rgba(212, 175, 55, 0.15);
            --accent-gold: #e5b842;
            --accent-gold-glow: rgba(229, 184, 66, 0.4);
            --text-light: #ffffff;
            --text-muted: #8a99ad;
            --text-gold: #d4af37;
            --font-display: 'Impact', 'Arial Black', sans-serif;
            --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- CSS RESET & BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-family: var(--font-sans);
            background-color: var(--bg-deep);
            color: var(--text-light);
            overflow-x: hidden;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #17223b 0%, var(--bg-deep) 70%);
            line-height: 1.6;
        }

        /* --- SCROLL PROGRESS INDICATOR --- */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--text-gold), var(--accent-gold));
            width: 0%;
            z-index: 2000;
            box-shadow: 0 0 10px var(--accent-gold-glow);
        }

        /* --- STICKY NAVIGATION BAR --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(5, 6, 8, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.7);
        }

        .nav-container {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--accent-gold);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(229, 184, 66, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            max-width: 80%;
            padding-bottom: 5px;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .nav-links::-webkit-scrollbar {
            display: none;
        }

        .nav-links {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .nav-links a {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 8px 14px;
            letter-spacing: 1px;
            transition: var(--transition-smooth);
            color: var(--text-muted);
            border: 1px solid transparent;
            border-radius: 4px;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-light);
            background: rgba(229, 184, 66, 0.1);
            border-color: var(--accent-gold);
            text-shadow: 0 0 5px var(--accent-gold-glow);
        }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 75vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 60px;
            position: relative;
            background: linear-gradient(rgba(5, 6, 8, 0.4), var(--bg-deep)), 
                        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="none" stroke="%23ffffff" stroke-width="0.3" stroke-opacity="0.03"/></svg>');
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 0.9;
            color: var(--text-light);
            text-shadow: 0 5px 25px rgba(0,0,0,0.8);
            margin-bottom: 15px;
            animation: glitch-appear 1s ease-out;
        }

        .hero h1 span {
            color: var(--accent-gold);
            display: block;
            font-size: 2.5rem;
            letter-spacing: 8px;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 700px;
            color: var(--text-muted);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- INSTANT SEARCH BOX --- */
        .search-wrapper {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }

        .search-box {
            width: 100%;
            padding: 18px 25px;
            background: var(--bg-glass);
            border: 2px solid var(--border-glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 6px;
            color: var(--text-light);
            font-size: 1.1rem;
            letter-spacing: 1px;
            outline: none;
            transition: var(--transition-smooth);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-box:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 25px var(--accent-gold-glow);
            background: rgba(18, 24, 33, 0.9);
        }

        /* --- GENERAL CONTENT LAYOUTS --- */
        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 0 25px;
        }

        section {
            padding: 80px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            scroll-margin-top: 80px;
        }

        /* ANIMATED SECTION HEADERS */
        .section-header {
            margin-bottom: 50px;
            position: relative;
        }

        .section-header h2 {
            font-family: var(--font-display);
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-light);
            display: inline-block;
            line-height: 1;
        }

        .section-header h2 span {
            color: var(--accent-gold);
        }

        .section-header::before {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 80px;
            height: 4px;
            background: var(--accent-gold);
            box-shadow: 0 0 10px var(--accent-gold-glow);
        }

        .section-header::after {
            content: 'TACTICAL DATA ARCHIVE';
            position: absolute;
            bottom: -32px;
            left: 0;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 3px;
        }

        /* GRID SYSTEM */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 35px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(48%, 1fr));
            gap: 35px;
        }

        /* --- PREMIUM GLASSMORPHISM CARDS --- */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: var(--transition-smooth);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: var(--accent-gold);
            box-shadow: 0 20px 40px rgba(229, 184, 66, 0.15);
        }

        /* IMAGE CONTAINER & ZOOM EFFECT */
        .card-thumb {
            width: 100%;
            height: 220px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            background-color: #1f293d;
        }

        /* Generates beautiful abstract geometric layouts as placeholder graphics without external resources */
        .thumb-news { background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #d4af37 75%), linear-gradient(-45deg, transparent 75%, #d4af37 75%); background-size: 20px 20px; }
        .thumb-season { background-image: linear-gradient(to right, rgba(0,0,0,0.7), transparent), repeating-linear-gradient(45deg, #121821, #121821 10px, #1a2332 10px, #1a2332 20px); }
        .thumb-patch { background-image: radial-gradient(circle at top right, rgba(229,184,66,0.2), transparent), repeating-linear-gradient(0deg, #121821, #121821 2px, transparent 2px, transparent 10px); }
        .thumb-events { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), repeating-linear-gradient(-45deg, #e5b842 0, #e5b842 2px, #121821 0, #121821 50%); background-size: 40px 40px; }
        .thumb-operators { background-image: radial-gradient(rgba(23, 34, 59, 0.8), #050608); position: relative; }
        .thumb-operators::before { content: '🪖'; font-size: 5rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.3; }
        .thumb-mp { background-image: linear-gradient(rgba(229,184,66,0.1), transparent), cross-fade(); background-color: #161d26; }
        .thumb-br { background-image: radial-gradient(circle, #24344d 0%, #0b0c10 100%); }
        .thumb-ranked { background-image: repeating-radial-gradient(circle, #121821, #121821 10px, #1f293d 10px, #1f293d 20px); }
        .thumb-rewards { background-image: linear-gradient(135deg, #121821 0%, #4a3707 100%); }
        .thumb-collab { background-image: linear-gradient(90deg, #0f172a 50%, #1e1b4b 50%); }
        .thumb-tourney { background-image: radial-gradient(transparent 50%, rgba(0,0,0,0.8) 100%), repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(229,184,66,0.05) 4px, rgba(229,184,66,0.05) 8px); }
        .thumb-dev { background-image: linear-gradient(to bottom, rgba(11,12,16,0.3), #0b0c10), repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(255,255,255,0.02) 20px, rgba(255,255,255,0.02) 40px); }

        .card-thumb::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, var(--bg-card) 5%, transparent 60%);
            transition: var(--transition-smooth);
        }

        .card:hover .card-thumb::after {
            background: linear-gradient(to top, var(--bg-card) 0%, transparent 40%);
        }

        /* FLOATING METADATA TAGS */
        .card-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(5, 6, 8, 0.85);
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 3px;
            z-index: 2;
        }

        /* VIEW LABEL POPUP CLICKER */
        .view-label {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent-gold);
            color: var(--bg-deep);
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 3px;
            cursor: pointer;
            z-index: 2;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .card:hover .view-label {
            background: var(--text-light);
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--text-light);
        }

        /* CARD CONTENT DESCRIPTIONS */
        .card-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card h3 {
            font-family: var(--font-sans);
            font-size: 1.4rem;
            font-weight: 800;
            line-height: 1.2;
            text-transform: uppercase;
            margin-bottom: 12px;
            color: var(--text-light);
            letter-spacing: 0.5px;
            transition: var(--transition-smooth);
        }

        .card:hover h3 {
            color: var(--accent-gold);
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* --- GLOWING ACTION BUTTONS --- */
        .btn-glow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            padding: 12px 28px;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
            margin-top: auto;
            align-self: flex-start;
        }

        .btn-glow::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-glow:hover::before {
            left: 100%;
        }

        .btn-glow:hover {
            background: var(--accent-gold);
            color: var(--bg-deep);
            box-shadow: 0 0 20px var(--accent-gold-glow);
            transform: translateY(-2px);
        }

        /* --- STYLISH POPUP MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 6, 8, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-window {
            background: #0f151f;
            border: 2px solid var(--accent-gold);
            border-radius: 8px;
            max-width: 750px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.8) translateY(30px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 0 0 30px var(--accent-gold-glow);
        }

        .modal-overlay.active .modal-window {
            transform: scale(1) translateY(0);
        }

        .modal-header-img {
            width: 100%;
            height: 250px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--bg-deep);
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            z-index: 10;
        }

        .modal-close-btn:hover {
            background: var(--accent-gold);
            color: var(--bg-deep);
            transform: rotate(90deg);
        }

        .modal-content {
            padding: 35px;
        }

        .modal-meta {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: var(--text-gold);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .modal-content h3 {
            font-family: var(--font-sans);
            font-size: 2.2rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            line-height: 1.2;
            color: var(--text-light);
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 15px;
        }

        .modal-body-text {
            color: #b0bdce;
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .modal-body-text ul, .modal-body-text ol {
            margin: 15px 0 15px 20px;
        }

        .modal-body-text li {
            margin-bottom: 8px;
        }

        /* --- JONASH (VIVIAN) ABOUT ME PROFILE SECTION --- */
        .profile-container {
            background: linear-gradient(135deg, rgba(18, 24, 33, 0.9) 0%, rgba(10, 14, 20, 0.95) 100%);
            border: 2px solid var(--border-glass);
            border-top: 4px solid var(--accent-gold);
            border-radius: 8px;
            padding: 45px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 45px;
            position: relative;
            overflow: hidden;
        }

        .profile-container::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            background: linear-gradient(45deg, transparent 48%, var(--border-glass) 50%, transparent 52%);
            background-size: 10px 10px;
            opacity: 0.4;
        }

        .profile-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .avatar-frame {
            width: 180px;
