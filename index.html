<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVIAN(JONASH) // 3D DEEP VOID</title>
    <style>
        :root {
            --space-black: #010002;
            --void-core: #000000;
            --void-purple: rgba(140, 0, 255, 0.85);
            --deep-violet: rgba(43, 0, 84, 0.5);
            --neon-cyan: #00f0ff;
            --font-display: 'Impact', 'Arial Black', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--space-black);
            font-family: var(--font-display);
            color: #fff;
        }

        /* --- 3D CANVAS & BACKGROUND ENVIRONMENT --- */
        .universe-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #06000d 0%, var(--space-black) 100%);
            z-index: 1;
            overflow: hidden;
            perspective: 1000px; /* Establishes deep 3D spatial field */
            transform: translateZ(0);
        }

        .starfield {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                radial-gradient(rgba(126, 0, 255, 0.04) 2px, transparent 2px);
            background-size: 80px 80px, 160px 160px;
            animation: cosmicDrift 140s linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        /* --- HYPER-REALISTIC 3D MOVING BLACK HOLE --- */
        .black-hole-viewport {
            position: absolute;
            top: 50%; left: 50%;
            width: 85vmin; height: 85vmin;
            max-width: 600px; max-height: 600px;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            
            /* High-performance multi-axis physical drifting animation */
            animation: spatial3DOrbit 24s ease-in-out infinite alternate;
            will-change: transform;
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Rear Gravitational Light Distortion (Sits behind core) */
        .gravitational-lens-vertical {
            position: absolute;
            width: 80%; height: 110%;
            border-radius: 50%;
            background: radial-gradient(circle at center, transparent 35%, var(--void-purple) 55%, var(--deep-violet) 75%, transparent 90%);
            transform: translateZ(-40px) scaleY(0.85) rotate(-8deg);
            z-index: 4;
            opacity: 0.85;
            filter: drop-shadow(0 0 15px var(--void-purple));
            animation: lensWarp 8s ease-in-out infinite alternate;
        }

        /* Pure Singularity Shadow Sphere Core */
        .shadow-core {
            width: 44%; height: 44%;
            background: var(--void-core);
            border-radius: 50%;
            z-index: 6;
            transform: translateZ(0px); /* Centered in 3D depth layer */
            box-shadow: 0 0 40px #000, 0 0 80px rgba(0,0,0,0.9), inset 0 0 50px #000;
        }

        /* 3D Accretion Disk Ring (Warped multi-layer intersecting plane) */
        .accretion-flat-disk {
            position: absolute;
            width: 130%; height: 35%;
            background: radial-gradient(ellipse at center, transparent 20%, var(--void-purple) 38%, var(--deep-violet) 58%, transparent 70%);
            /* Tilts disk directly across the 3D horizon axis */
            transform: translateZ(20px) rotateX(72deg) rotateZ(-12deg);
            z-index: 7;
            opacity: 0.95;
            mix-blend-mode: screen;
            animation: diskRotation 12s linear infinite;
        }

        /* Secondary background disk edge glow to simulate light wrapper encapsulation */
        .accretion-flat-disk::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 25%, rgba(126, 0, 255, 0.4) 40%, transparent 60%);
            transform: translateZ(-60px);
            z-index: 3;
        }

        /* --- VIEWPORT DISPLAY LAYERS --- */
        .viewport-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* --- STAGE 1: SYSTEM INGEST LOADING ROUTINE --- */
        .loading-title {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(140,0,255,0.5);
        }

        .bar-container {
            width: min(85vw, 380px);
            height: 6px;
            background: rgba(0, 0, 0, 0.9);
            border: 1.5px solid var(--deep-violet);
            border-radius: 1px;
            overflow: hidden;
        }

        .bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--deep-violet), var(--void-purple));
            box-shadow: 0 0 10px var(--void-purple);
            transition: width 0.1s linear;
        }

        .percentage-display {
            font-family: monospace;
            font-size: 1.4rem;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        /* --- STAGE 2: ULTRA-TRANSPARENT NAVIGATION HUD --- */
        .system-branding {
            font-size: clamp(2.3rem, 6.5vw, 5.5rem);
            font-style: italic;
            text-transform: uppercase;
            margin-bottom: clamp(40px, 8vh, 70px);
            position: relative;
            display: inline-block;
            background: transparent;
            border: none;
            padding: 10px;
        }

        .system-branding .left-half {
            color: #fff;
            text-shadow: 2px 2px 0px #000, 0 0 20px rgba(140, 0, 255, 0.8);
            padding-right: 4px;
        }

        .system-branding .right-half {
            color: #fff;
            text-shadow: 2px 2px 0px #000, 0 0 20px var(--neon-cyan);
            padding-left: 4px;
        }

        .system-branding::after {
            content: '⚡';
            font-size: 0.8em;
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotate(12deg);
            color: #fff;
            text-shadow: 0 0 15px #fff, 0 0 20px var(--neon-cyan);
        }

        .action-cluster {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: min(90vw, 360px);
        }

        /* Completely transparent interactors */
        .interactive-node {
            background: transparent;
            color: #fff;
            border: none;
            font-family: var(--font-display);
            font-size: clamp(2rem, 4.5vw, 2.6rem);
            font-style: italic;
            text-transform: uppercase;
            padding: 12px 20px;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), text-shadow 0.2s ease;
            text-shadow: 0 0 8px rgba(140, 0, 255, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .node-singularity {
            width: 10px; height: 10px;
            background: #000;
            border-radius: 50%;
            box-shadow: 0 0 10px 3px var(--void-purple), 0 0 18px 5px var(--deep-violet);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .interactive-node:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
            transform: scale(1.06);
        }

        .interactive-node:hover .node-singularity {
            box-shadow: 0 0 12px 5px var(--neon-cyan), 0 0 20px 7px #0077ff;
            transform: scale(1.3);
        }

        /* --- STAGE 3: ABSOLUTE TRANSPARENT MODAL OVERLAY SHEET --- */
        .multiverse-grid {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 2;
            pointer-events: none;
            display: flex;
            justify-content: space-around;
            align-items: center;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .multiverse-active { opacity: 1 !important; }

        .mini-singularity {
            position: absolute;
            width: 25vmin; height: 25vmin;
            background: #000;
            border-radius: 50%;
            box-shadow: 0 0 25px var(--void-purple), 0 0 50px var(--deep-violet);
            animation: targetFloat 12s ease-in-out infinite alternate;
        }

        /* Complete background transparency conversion */
        .data-vault-panel {
            width: min(92vw, 740px);
            background: transparent; /* Full transparency */
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.25);
            backdrop-filter: blur(5px); /* Smooth readability separation over objects */
            -webkit-backdrop-filter: blur(5px);
            padding: clamp(22px, 5vw, 42px);
            border-radius: 4px;
            z-index: 15;
            display: flex;
            flex-direction: column;
        }

        .vault-title {
            font-size: clamp(1.6rem, 4vw, 2.5rem);
            font-style: italic;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 12px var(--void-purple);
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(255,255,255,0.25);
            padding-bottom: 10px;
        }

        .vault-body {
            font-family: sans-serif;
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            line-height: 1.6;
            color: #ffffff;
            text-shadow: 1px 1px 3px #000, 0 0 4px rgba(0,0,0,0.8);
            margin-bottom: 30px;
        }

        .vault-close-btn {
            background: transparent;
            border: 2px solid var(--void-purple);
            color: #fff;
            padding: 12px 32px;
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-style: italic;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, color 0.2s;
            align-self: center;
            text-shadow: 0 0 8px var(--void-purple);
            -webkit-tap-highlight-color: transparent;
        }

        .vault-close-btn:hover {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            transform: scale(1.05);
        }

        /* --- COLLAPSE VISUAL STATE SETTINGS --- */
        .swallowed-by-singularity {
            animation: none !important;
            transform: translate3d(-50%, -50%, 0) scale(8.5) !important;
            opacity: 0;
        }

        .menu-spaghettify {
            transform: scale(0.5);
            opacity: 0;
        }

        /* --- HARDWARE-ACCELERATED HIGH-FPS ANIMATIONS --- */
        /* Dynamic 3D axis drifting, tilting, and rocking rotation pathing */
        @keyframes spatial3DOrbit {
            0% { transform: translate3d(-53%, -53%, 20px) rotateX(-4deg) rotateY(6deg); }
            50% { transform: translate3d(-46%, -47%, -30px) rotateX(4deg) rotateY(-4deg); }
            100% { transform: translate3d(-48%, -55%, 10px) rotateX(-2deg) rotateY(8deg); }
        }

        @keyframes diskRotation {
            0% { transform: translateZ(20px) rotateX(74deg) rotateZ(0deg); }
            100% { transform: translateZ(20px) rotateX(74deg) rotateZ(-360deg); }
        }

        @keyframes lensWarp {
            0% { transform: translateZ(-40px) scaleY(0.85) scaleX(1) rotate(-8deg); }
            100% { transform: translateZ(-40px) scaleY(0.88) scaleX(1.04) rotate(-5deg); }
        }

        @keyframes cosmicDrift {
            0% { transform: translate3d(0,0,0); }
            100% { transform: translate3d(-40px, -40px, 0); }
        }

        @keyframes targetFloat {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-10px, -20px, 0); }
        }
    </style>
</head>
<body>

    <div class="universe-bg">
        <div class="starfield"></div>
        
        <div class="black-hole-viewport" id="mainBlackHole">
            <div class="gravitational-lens-vertical"></div>
            <div class="shadow-core"></div>
            <div class="accretion-flat-disk"></div>
        </div>

        <div class="multiverse-grid" id="multiverseField">
            <div class="mini-singularity" style="top: 15%; left: 8%; animation-delay: 0s; width: 14vmin; height: 14vmin;"></div>
            <div class="mini-singularity" style="top: 68%; left: 12%; animation-delay: -2s; width: 25vmin; height: 25vmin;"></div>
            <div class="mini-singularity" style="top: 18%; right: 10%; animation-delay: -4s; width: 20vmin; height: 20vmin;"></div>
            <div class="mini-singularity" style="top: 64%; right: 6%; animation-delay: -1s; width: 16vmin; height: 16vmin;"></div>
        </div>
    </div>

    <div id="loaderStage" class="viewport-stage">
        <h2 class="loading-title">Stabilizing Orbit</h2>
        <div class="bar-container">
            <div class="bar-fill" id="progressBar"></div>
        </div>
        <div class="percentage-display" id="progressText">0%</div>
    </div>

    <div id="menuStage" class="viewport-stage hidden">
        <h1 class="system-branding">
            <span class="left-half">VIVIAN</span><span class="right-half">(JONASH)</span>
        </h1>
        <div class="action-cluster">
            <button class="interactive-node" onclick="swallowSequence('codm')">
                <div class="node-singularity"></div>
                <span>CODM</span>
                <div class="node-singularity"></div>
            </button>
            <button class="interactive-node" onclick="swallowSequence('fnf')">
                <div class="node-singularity"></div>
                <span>FNF</span>
                <div class="node-singularity"></div>
            </button>
        </div>
    </div>

    <div id="vaultStage" class="viewport-stage hidden">
        <div class="data-vault-panel">
            <h2 class="vault-title" id="vaultHeader">CODM // SUB-SPACE METRICS</h2>
            <div class="vault-body" id="vaultContent">
                Isolated profile information successfully transmitted past the main accretion barrier. Core targeting tracking coordinates remain locked inside processing matrices.
            </div>
            <button class="vault-close-btn" onclick="restoreFromUnknown()">[ ESCAPE MULTIVERSE ]</button>
        </div>
    </div>

    <script>
        // Orchestrated Linear Pre-boot Sequence
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progressBar');
            const txt = document.getElementById('progressText');
            let count = 0;

            const trackingLoop = setInterval(() => {
                count += Math.floor(Math.random() * 6) + 3;
                if (count >= 100) {
                    count = 100;
                    clearInterval(trackingLoop);
                    setTimeout(() => {
                        document.getElementById('loaderStage').classList.add('hidden');
                        document.getElementById('menuStage').classList.remove('hidden');
                    }, 350);
                }
                bar.style.width = count + "%";
                txt.innerText = count + "%";
            }, 30);
        });

        // Relativistic Transition Sequence
        function swallowSequence(gameId) {
            const bh = document.getElementById('mainBlackHole');
            const menu = document.getElementById('menuStage');
            const vault = document.getElementById('vaultStage');
            const fields = document.getElementById('multiverseField');
            
            const head = document.getElementById('vaultHeader');
            const body = document.getElementById('vaultContent');

            if (gameId === 'codm') {
                head.innerText = "CODM // SUB-SPACE METRICS";
                body.innerHTML = "Isolated profile information successfully transmitted past the main accretion barrier. Core targeting tracking coordinates remain locked inside processing matrices.";
            } else if (gameId === 'fnf') {
                head.innerText = "FNF // FREQUENCY FRAGMENT";
                body.innerHTML = "Acoustic control structures translated into non-linear vector frames. Local audio spectrum coordinates are currently maintaining stability within background tears.";
            }

            bh.classList.add('swallowed-by-singularity');
            menu.classList.add('menu-spaghettify');

            setTimeout(() => {
                menu.classList.add('hidden');
                bh.classList.add('hidden');
                
                vault.classList.remove('hidden');
                fields.classList.add('multiverse-active');
            }, 600);
        }

        // Return Matrix Logic Loop
        function restoreFromUnknown() {
            const bh = document.getElementById('mainBlackHole');
            const menu = document.getElementById('menuStage');
            const vault = document.getElementById('vaultStage');
            const fields = document.getElementById('multiverseField');

            vault.classList.add('hidden');
            fields.classList.remove('multiverse-active');
            
            bh.classList.remove('hidden');
            menu.classList.remove('hidden');

            setTimeout(() => {
                bh.classList.remove('swallowed-by-singularity');
                menu.classList.remove('menu-spaghettify');
            }, 30);
        }
    </script>
</body>
                </html>
