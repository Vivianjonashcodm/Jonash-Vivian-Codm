<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS VOID // THE RE-IGNITION</title>
    <style>
        :root {
            --void-black: #030108;
            --void-neon: #00ffff;
            --void-magenta: #ff0055;
            --void-purple: #7a00ff;
            --font-fnf: 'Impact', 'Arial Black', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--void-black);
            font-family: var(--font-fnf);
            color: #fff;
        }

        /* --- COSMIC FNF VOID BACKGROUND --- */
        .void-space {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #18003c 0%, var(--void-black) 90%);
            z-index: 1;
            overflow: hidden;
        }

        /* Floating Cosmic Debris / Floating FNF Arrows spikes in the background */
        .void-spikes {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(rgba(0, 255, 255, 0.15) 2px, transparent 2px),
                radial-gradient(rgba(255, 0, 85, 0.15) 3px, transparent 3px);
            background-size: 80px 80px, 120px 120px;
            z-index: 2;
            animation: cosmicFloat 12s linear infinite;
        }

        /* Chromatic Aberration / Glitch Effect Lines */
        .glitch-static {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 50%, rgba(122, 0, 255, 0.15) 50%);
            background-size: 100% 6px;
            z-index: 3;
            pointer-events: none;
            opacity: 0.7;
        }

        /* --- SCREEN MANAGEMENT --- */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .shattered {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.3) rotate(5deg);
            filter: hue-rotate(90deg) blur(10px);
        }

        /* --- SCREEN 1: THE COSMIC ENTRANCE --- */
        #entranceScreen {
            cursor: pointer;
        }

        /* A massive cosmic entity eye / FNF speaker hybrid vortex */
        .void-vortex {
            width: 200px;
            height: 200px;
            background: repeating-radial-gradient(var(--void-black), var(--void-purple) 20px, var(--void-neon) 40px);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--void-purple), inset 0 0 30px var(--void-magenta);
            animation: fnfBeatBump 0.5s ease-in-out infinite alternate, vortexSpin 4s linear infinite;
            margin-bottom: 40px;
        }

        .cosmic-logo {
            font-size: 5.5rem;
            font-style: italic;
            text-transform: uppercase;
            text-align: center;
            line-height: 0.85;
            letter-spacing: -2px;
            color: #fff;
            text-shadow: 6px 6px 0px var(--void-magenta), -4px -4px 0px var(--void-neon);
            animation: fnfBeatBump 0.5s ease-in-out infinite alternate-reverse;
            margin-bottom: 40px;
        }

        .press-enter-flash {
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 3px 3px 0px #000;
            animation: textFlash 0.6s steps(2) infinite;
        }

        /* --- SCREEN 2: FNF VOID MAIN MENU --- */
        .menu-title {
            font-size: 3.5rem;
            font-style: italic;
            color: var(--void-neon);
            text-shadow: 4px 4px 0px var(--void-magenta);
            margin-bottom: 50px;
            animation: fnfBeatBump 0.5s ease-in-out infinite alternate;
        }

        .menu-cluster {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 340px;
        }

        .menu-node {
            background: transparent;
            border: none;
            font-family: var(--font-fnf);
            font-size: 3rem;
            font-style: italic;
            color: #4c3f63;
            text-transform: uppercase;
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s ease;
            text-shadow: 3px 3px 0px #000;
            outline: none;
        }

        /* The signature bouncy FNF selected item animation */
        .menu-node.selected, .menu-node:hover {
            color: #fff;
            transform: scale(1.2) rotate(-3deg);
            text-shadow: 5px 5px 0px var(--void-magenta), -3px -3px 0px var(--void-neon);
        }

        /* --- SCREEN 3: INSIDE THE SITE (STAGES/SONGS) --- */
        .inside-panel {
            width: 85%;
            max-width: 900px;
            background: rgba(10, 2, 20, 0.85);
            border: 4px solid var(--void-neon);
            box-shadow: 0 0 30px var(--void-purple), inset 0 0 20px rgba(0,255,255,0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            transform: rotate(1deg);
        }

        .panel-header {
            font-size: 3rem;
            font-style: italic;
            color: #fff;
            text-shadow: 4px 4px 0px var(--void-magenta);
            margin-bottom: 35px;
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }

        .song-track {
            background: rgba(255, 0, 85, 0.1);
            border: 2px solid var(--void-magenta);
            padding: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .song-track:hover {
            background: var(--void-neon);
            color: #000;
            border-color: #fff;
            transform: scale(1.03) rotate(-1deg);
        }

        .back-node {
            background: transparent;
            border: none;
            color: #fff;
            font-family: var(--font-fnf);
            font-size: 1.8rem;
            font-style: italic;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
        }

        .back-node:hover {
            color: var(--void-magenta);
            transform: scale(1.1);
        }

        /* --- FNF PSYCH ENGINE ANIMATIONS --- */
        @keyframes cosmicFloat {
            0% { background-position: 0 0; }
            100% { background-position: 120px 120px; }
        }

        @keyframes vortexSpin {
            100% { transform: rotate(360deg); }
        }

        /* Mimics character bumping on the beat drop */
        @keyframes fnfBeatBump {
            0% { transform: scale(1); }
            100% { transform: scale(1.08) translateY(-5px); }
        }

        @keyframes textFlash {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="void-space">
        <div class="void-spikes"></div>
        <div class="glitch-static"></div>
    </div>

    <!-- 1. ENTRANCE SCREEN (FNF LOGO BUMPING TO THE BEAT) -->
    <div id="entranceScreen" class="screen" onclick="triggerBreach()">
        <div class="void-vortex"></div>
        <h1 class="cosmic-logo">VS VOID<br><span style="color: var(--void-neon)">ENTER</span></h1>
        <div class="press-enter-flash">PRESS ENTER OR CLICK TO SINGULARITY</div>
    </div>

    <!-- 2. MAIN MENU SCREEN -->
    <div id="mainMenuScreen" class="screen shattered">
        <h2 class="menu-title">// CHOOSE TRACK //</h2>
        <div class="menu-cluster">
            <button class="menu-node selected" onclick="enterInside('cosmic')">Cosmic Week</button>
            <button class="menu-node" onclick="enterInside('freeplay')">Freeplay</button>
            <button class="menu-node" onclick="enterInside('settings')">Calibrate</button>
        </div>
    </div>

    <!-- 3. THE INSIDE OF THE SITE -->
    <div id="insideScreen" class="screen shattered">
        <div class="inside-panel">
            <h2 id="panelTitle" class="panel-header">COSMIC TRACKS</h2>
            
            <div class="song-list">
                <div class="song-track">
                    <span>1. STARCONIC</span>
                    <span style="font-size: 1rem; color: var(--void-neon);">HARD</span>
                </div>
                <div class="song-track">
                    <span>2. INTERSTELLAR</span>
                    <span style="font-size: 1rem; color: var(--void-neon);">HARD</span>
                </div>
                <div class="song-track">
                    <span>3. GRAVITY DRIFT</span>
                    <span style="font-size: 1rem; color: var(--void-magenta);">EXPERT</span>
                </div>
            </div>

            <button class="back-node" onclick="escapeToMenu()">[ ESC ] GO BACK</button>
        </div>
    </div>

    <script>
        let currentView = 'entrance';
        let navIndex = 0;
        const choices = document.querySelectorAll('.menu-node');

        // Transition from Entrance to Main Menu
        function triggerBreach() {
            if (currentView !== 'entrance') return;
            document.getElementById('entranceScreen').classList.add('shattered');
            document.getElementById('mainMenuScreen').classList.remove('shattered');
            currentView = 'menu';
        }

        // Navigate "Inside" the website sections
        function enterInside(type) {
            document.getElementById('mainMenuScreen').classList.add('shattered');
            document.getElementById('insideScreen').classList.remove('shattered');
            currentView = 'inside';

            const pTitle = document.getElementById('panelTitle');
            if (type === 'cosmic') {
                pTitle.innerText = "COSMIC STAGE SELECTION";
            } else if (type === 'freeplay') {
                pTitle.innerText = "FREEPLAY SOUNDTRACKS";
            } else {
                pTitle.innerText = "VISUAL METRICS SETTINGS";
            }
        }

        function escapeToMenu() {
            document.getElementById('insideScreen').classList.add('shattered');
            document.getElementById('mainMenuScreen').classList.remove('shattered');
            currentView = 'menu';
        }

        // FNF Rhythm Engine Inputs (Keyboard Navigation)
        document.addEventListener('keydown', (e) => {
            if (currentView === 'entrance') {
                if (e.key === 'Enter' || e.key === ' ') triggerBreach();
            } 
            else if (currentView === 'menu') {
                if (e.key === 'ArrowDown' || e.key === 's') shiftSelection(1);
                else if (e.key === 'ArrowUp' || e.key === 'w') shiftSelection(-1);
                else if (e.key === 'Enter') choices[navIndex].click();
            } 
            else if (currentView === 'inside') {
                if (e.key === 'Escape') escapeToMenu();
            }
        });

        function shiftSelection(amount) {
            choices[navIndex].classList.remove('selected');
            navIndex = (navIndex + amount + choices.length) % choices.length;
            choices[navIndex].classList.add('selected');
        }

        // Mouse hover sync
        choices.forEach((element, i) => {
            element.addEventListener('mouseenter', () => {
                choices[navIndex].classList.remove('selected');
                navIndex = i;
                element.classList.add('selected');
            });
        });
    </script>
</body>
</html>
