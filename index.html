<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>voidXcyber // QUANTUM SINGULARITY</title>
    <style>
        :root {
            --space-black: #020005;
            --void-core: #000000;
            --cyber-purple: #9d00ff;
            --cyber-dark: #120024;
            --cyber-neon: #00f6ff;
            --font-display: 'Impact', 'Arial Black', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--space-black);
            font-family: var(--font-display);
            color: #fff;
        }

        /* --- BACKGROUND VIRTUAL ENVIRONMENT --- */
        .universe-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #0b001a 0%, var(--space-black) 100%);
            z-index: 1;
            overflow: hidden;
            transform: translateZ(0);
        }

        .cyber-grid {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(rgba(157, 0, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(157, 0, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridScroll 40s linear infinite;
            z-index: 2;
            opacity: 0.7;
        }

        /* --- SUPER ROUND PERFECT SINGULARITY NODE --- */
        .black-hole-viewport {
            position: absolute;
            top: 50%; left: 50%;
            width: 80vmin; height: 80vmin;
            max-width: 520px; max-height: 520px;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Ultra-smooth organic drifting movement */
            animation: perfectFloat 14s ease-in-out infinite alternate;
            will-change: transform;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Perfectly circular gravitational energy orbits */
        .singularity-glow-outer {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at center, transparent 45%, var(--cyber-purple) 60%, rgba(0, 246, 255, 0.3) 75%, transparent 100%);
            z-index: 4;
            filter: blur(14px);
            animation: spinClockwise 25s linear infinite;
        }

        .singularity-glow-inner {
            position: absolute;
            width: 75%; height: 75%;
            border-radius: 50%;
            background: radial-gradient(circle at center, transparent 35%, rgba(157, 0, 255, 0.8) 50%, var(--cyber-neon) 70%, transparent 90%);
            z-index: 5;
            filter: blur(6px);
            animation: spinCounterClockwise 15s linear infinite;
        }

        /* Flawless Pitch-Black Event Horizon Core Shadow */
        .shadow-core {
            width: 48%; height: 48%;
            background: var(--void-core);
            border-radius: 50%;
            z-index: 6;
            box-shadow: 
                0 0 40px #000, 
                0 0 70px var(--cyber-purple), 
                inset 0 0 30px #000;
        }

        /* --- STAGE CONFIGURATOR PANELS --- */
        .viewport-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* --- STAGE 1: BOOT SEQUENCER --- */
        .loading-title {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 25px;
            text-shadow: 0 0 15px var(--cyber-purple);
        }

        .bar-container {
            width: min(85vw, 360px);
            height: 4px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--cyber-purple);
            overflow: hidden;
        }

        .bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--cyber-purple), var(--cyber-neon));
            box-shadow: 0 0 12px var(--cyber-neon);
            transition: width 0.1s linear;
        }

        .percentage-display {
            font-family: monospace;
            font-size: 1.3rem;
            margin-top: 15px;
            letter-spacing: 3px;
            color: var(--cyber-neon);
            text-shadow: 0 0 5px var(--cyber-neon);
        }

        /* --- STAGE 2: TRANSPARENT voidXcyber HUD --- */
        .system-branding {
            font-size: clamp(2.3rem, 6.5vw, 5.5rem);
            font-style: italic;
            text-transform: uppercase;
            margin-bottom: clamp(40px, 8vh, 70px);
            position: relative;
            display: inline-block;
            background: transparent;
            border: none;
            padding: 10px;
        }

        .system-branding .left-half {
            color: #fff;
            text-shadow: 2px 2px 0px #000, 0 0 20px var(--cyber-purple);
            padding-right: 4px;
        }

        .system-branding .right-half {
            color: #fff;
            text-shadow: 2px 2px 0px #000, 0 0 20px var(--cyber-neon);
            padding-left: 4px;
        }

        .system-branding::after {
            content: '×';
            font-size: 0.9em;
            position: absolute;
            left: 51%; top: 46%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-shadow: 0 0 15px #fff, 0 0 25px var(--cyber-neon);
        }

        .action-cluster {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: min(90vw, 360px);
        }

        .interactive-node {
            background: transparent;
            color: #fff;
            border: none;
            font-family: var(--font-display);
            font-size: clamp(2rem, 4.5vw, 2.6rem);
            font-style: italic;
            text-transform: uppercase;
            padding: 12px 20px;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), text-shadow 0.2s ease;
            text-shadow: 0 0 8px rgba(157, 0, 255, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .node-singularity {
            width: 8px; height: 8px;
            background: #000;
            border-radius: 50%;
            box-shadow: 0 0 10px 3px var(--cyber-purple), 0 0 15px 5px var(--cyber-dark);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .interactive-node:hover {
            color: var(--cyber-neon);
            text-shadow: 0 0 15px var(--cyber-neon);
            transform: scale(1.06);
        }

        .interactive-node:hover .node-singularity {
            box-shadow: 0 0 12px 5px var(--cyber-neon), 0 0 20px 7px #0084ff;
            transform: scale(1.4);
        }

        /* --- STAGE 3: PURE TRANSPARENT CYBER MODAL DATA BAR --- */
        .multiverse-grid {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 2;
            pointer-events: none;
            display: flex;
            justify-content: space-around;
            align-items: center;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .multiverse-active { opacity: 1 !important; }

        .mini-singularity {
            position: absolute;
            width: 20vmin; height: 20vmin;
            background: #000;
            border-radius: 50%;
            box-shadow: 0 0 20px var(--cyber-purple), 0 0 40px var(--cyber-dark);
            animation: targetFloat 10s ease-in-out infinite alternate;
        }

        .data-vault-panel {
            width: min(92vw, 740px);
            background: transparent;
            border: 2px solid var(--cyber-neon);
            box-shadow: 0 0 30px rgba(0, 246, 255, 0.2);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: clamp(22px, 5vw, 42px);
            border-radius: 2px;
            z-index: 15;
            display: flex;
            flex-direction: column;
        }

        .vault-title {
            font-size: clamp(1.5rem, 4vw, 2.3rem);
            font-style: italic;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 12px var(--cyber-purple);
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        .vault-body {
            font-family: sans-serif;
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            line-height: 1.6;
            color: #ffffff;
            text-shadow: 1px 1px 3px #000;
            margin-bottom: 30px;
        }

        .vault-close-btn {
            background: transparent;
            border: 2px solid var(--cyber-purple);
            color: #fff;
            padding: 12px 32px;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-style: italic;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, color 0.2s;
            align-self: center;
            text-shadow: 0 0 8px var(--cyber-purple);
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }

        .vault-close-btn:hover {
            color: var(--cyber-neon);
            border-color: var(--cyber-neon);
            box-shadow: 0 0 15px var(--cyber-neon);
            transform: scale(1.05);
        }

        /* --- CINEMATIC TRANSITION STATES --- */
        .swallowed-by-singularity {
            animation: none !important;
            transform: translate3d(-50%, -50%, 0) scale(9) !important;
            opacity: 0;
        }

        .menu-spaghettify {
            transform: scale(0.6);
            opacity: 0;
        }

        /* --- HIGH PERFORMANCE HARDWARE ANIMATIONS --- */
        @keyframes perfectFloat {
            0% { transform: translate3d(-53%, -52%, 0); }
            50% { transform: translate3d(-47%, -47%, 0); }
            100% { transform: translate3d(-50%, -55%, 0); }
        }

        @keyframes spinClockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spinCounterClockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        @keyframes gridScroll {
            0% { background-position: 0 0; }
            100% { background-position: 0 200px; }
        }

        @keyframes targetFloat {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-10px, -15px, 0); }
        }
    </style>
</head>
<body>

    <div class="universe-bg">
        <div class="cyber-grid"></div>
        
        <div class="black-hole-viewport" id="mainBlackHole">
            <div class="singularity-glow-outer"></div>
            <div class="singularity-glow-inner"></div>
            <div class="shadow-core"></div>
        </div>

        <div class="multiverse-grid" id="multiverseField">
            <div class="mini-singularity" style="top: 12%; left: 6%; animation-delay: 0s; width: 14vmin; height: 14vmin;"></div>
            <div class="mini-singularity" style="top: 70%; left: 10%; animation-delay: -2s; width: 22vmin; height: 22vmin;"></div>
            <div class="mini-singularity" style="top: 20%; right: 8%; animation-delay: -4s; width: 18vmin; height: 18vmin;"></div>
            <div class="mini-singularity" style="top: 66%; right: 5%; animation-delay: -1s; width: 15vmin; height: 15vmin;"></div>
        </div>
    </div>

    <div id="loaderStage" class="viewport-stage">
        <h2 class="loading-title">voidXcyber // Initialize</h2>
        <div class="bar-container">
            <div class="bar-fill" id="progressBar"></div>
        </div>
        <div class="percentage-display" id="progressText">0%</div>
    </div>

    <div id="menuStage" class="viewport-stage hidden">
        <h1 class="system-branding">
            <span class="left-half">void</span><span class="right-half">cyber</span>
        </h1>
        <div class="action-cluster">
            <button class="interactive-node" onclick="swallowSequence('codm')">
                <div class="node-singularity"></div>
                <span>CODM</span>
                <div class="node-singularity"></div>
            </button>
            <button class="interactive-node" onclick="swallowSequence('fnf')">
                <div class="node-singularity"></div>
                <span>FNF</span>
                <div class="node-singularity"></div>
            </button>
        </div>
    </div>

    <div id="vaultStage" class="viewport-stage hidden">
        <div class="data-vault-panel">
            <h2 class="vault-title" id="vaultHeader">SYSTEM LOGS //</h2>
            <div class="vault-body" id="vaultContent">
                Synchronizing terminal data streams directly inside the network layer.
            </div>
            <button class="vault-close-btn" onclick="restoreFromUnknown()">[ INITIALIZE DISCONNECT ]</button>
        </div>
    </div>

    <script>
        // Automatic Network System Loader Progress Simulated Cycle
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progressBar');
            const txt = document.getElementById('progressText');
            let count = 0;

            const trackingLoop = setInterval(() => {
                count += Math.floor(Math.random() * 7) + 4;
                if (count >= 100) {
                    count = 100;
                    clearInterval(trackingLoop);
                    setTimeout(() => {
                        document.getElementById('loaderStage').classList.add('hidden');
                        document.getElementById('menuStage').classList.remove('hidden');
                    }, 350);
                }
                bar.style.width = count + "%";
                txt.innerText = count + "%";
            }, 25:
        });

        // Event Collapse Action Router Logic
        function swallowSequence(gameId) {
            const bh = document.getElementById('mainBlackHole');
            const menu = document.getElementById('menuStage');
            const vault = document.getElementById('vaultStage');
            const fields = document.getElementById('multiverseField');
            
            const head = document.getElementById('vaultHeader');
            const body = document.getElementById('vaultContent');

            if (gameId === 'codm') {
                head.innerText = "CODM DATA NODE // OPERATIONAL";
                body.innerHTML = "Isolated user data files mapped inside virtual sector frame loops. Operational signals securely parsed and verified across current background arrays.";
            } else if (gameId === 'fnf') {
                head.innerText = "FNF AUDIO STREAM // DEPLOYED";
                body.innerHTML = "Acoustic sequence profiles synthesized into clean algorithmic arrays. Frequency fields remain responsive inside core matrix data vectors.";
            }

            bh.classList.add('swallowed-by-singularity');
            menu.classList.add('menu-spaghettify');

            setTimeout(() => {
                menu.classList.add('hidden');
                bh.classList.add('hidden');
                
                vault.classList.remove('hidden');
                fields.classList.add('multiverse-active');
            }, 600);
        }

        // Return HUD System Matrix Sequence Router
        function restoreFromUnknown() {
            const bh = document.getElementById('mainBlackHole');
            const menu = document.getElementById('menuStage');
            const vault = document.getElementById('vaultStage');
            const fields = document.getElementById('multiverseField');

            vault.classList.add('hidden');
            fields.classList.remove('multiverse-active');
            
            bh.classList.remove('hidden');
            menu.classList.remove('hidden');

            setTimeout(() => {
                bh.classList.remove('swallowed-by-singularity');
                menu.classList.remove('menu-spaghettify');
            }, 30);
        }
    </script>
</body>
</html>
