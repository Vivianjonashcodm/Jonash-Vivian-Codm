<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID EVENT HORIZON</title>
    <style>
        :root {
            --bg-black: #020005;
            --void-purple: #1f013d;
            --neon-magenta: #da00ff;
            --neon-violet: #6a00ff;
            --text-glow: #e9ccff;
            --font-display: 'Impact', 'Arial Black', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-black);
            font-family: var(--font-display);
            color: #fff;
        }

        /* --- THE ACTIVE COSMIC BACKGROUND --- */
        .void-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--void-purple) 0%, var(--bg-black) 95%);
            z-index: 1;
            overflow: hidden;
        }

        /* Spikes & Particle Matter Drifting */
        .void-debris {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%; left: -50%;
            background-image: 
                radial-gradient(rgba(218, 0, 255, 0.12) 3px, transparent 3px),
                radial-gradient(rgba(106, 0, 255, 0.08) 2px, transparent 2px);
            background-size: 60px 60px, 90px 90px;
            animation: bypassDrift 20s linear infinite;
            z-index: 2;
        }

        /* Glitch Horizontal Distortions */
        .chromatic-static {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(218, 0, 255, 0.08) 50%);
            background-size: 100% 8px;
            z-index: 3;
            pointer-events: none;
        }

        /* --- STAGE ARCHITECTURE --- */
        .stage {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .collapsed {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.5) rotate(-10deg);
            filter: blur(25px) hue-rotate(45deg);
        }

        /* --- STAGE 1: SPINNER LOADING SCREEN --- */
        .loading-vortex {
            position: relative;
            width: 220px; height: 220px;
            background: #000;
            border-radius: 50%;
            box-shadow: 
                0 0 30px #000,
                0 0 60px 20px var(--neon-violet),
                0 0 120px 40px var(--neon-magenta);
            animation: pulseVortex 1s ease-in-out infinite alternate;
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Circling Accretion Ring */
        .loading-vortex::before {
            content: '';
            position: absolute;
            top: -25px; left: -25px; right: -25px; bottom: -25px;
            border-radius: 50%;
            border: 4px dotted var(--neon-magenta);
            border-top-color: transparent;
            border-bottom-color: transparent;
            animation: rotateOrbit 1.5s linear infinite;
        }

        .loading-vortex::after {
            content: '';
            position: absolute;
            top: -12px; left: -12px; right: -12px; bottom: -12px;
            border-radius: 50%;
            border: 2px dashed var(--neon-violet);
            animation: rotateOrbit Reverse 3s linear infinite;
        }

        .percent-counter {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 15px var(--text-glow);
            letter-spacing: 2px;
            z-index: 5;
        }

        .loading-subtext {
            font-size: 1.2rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--neon-magenta);
            text-shadow: 0 0 10px var(--neon-magenta);
            animation: flashWarning 0.4s steps(2) infinite;
        }

        /* --- STAGE 2: HYPER VOID MENU --- */
        .void-title-banner {
            font-size: 4.5rem;
            font-style: italic;
            letter-spacing: -1px;
            text-transform: uppercase;
            text-shadow: 5px 5px 0px var(--neon-magenta), -3px -3px 0px var(--neon-violet);
            margin-bottom: 50px;
            animation: titlesway 3s ease-in-out infinite alternate;
        }

        .button-cluster {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 320px;
        }

        /* Spiked Custom Game Buttons */
        .void-btn {
            background: rgba(31, 1, 61, 0.4);
            color: #fff;
            border: 3px solid var(--neon-violet);
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-style: italic;
            text-transform: uppercase;
            padding: 10px 20px;
            cursor: pointer;
            outline: none;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(106,0,255,0.3);
            transition: all 0.2s ease;
        }

        /* Left/Right spike highlights on hover */
        .void-btn::before {
            content: '◀';
            position: absolute;
            left: -30px;
            color: var(--neon-magenta);
            transition: left 0.2s ease;
        }
        .void-btn::after {
            content: '▶';
            position: absolute;
            right: -30px;
            color: var(--neon-magenta);
            transition: right 0.2s ease;
        }

        .void-btn:hover {
            color: var(--neon-magenta);
            border-color: var(--neon-magenta);
            background: #000;
            box-shadow: 0 0 25px var(--neon-magenta);
            transform: scale(1.08) rotate(-1deg);
        }

        .void-btn:hover::before { left: 15px; }
        .void-btn:hover::after { right: 15px; }

        /* --- STAGE 3: DATA STREAM INFOPANEL --- */
        .info-panel {
            width: 90%;
            max-width: 750px;
            background: #040108;
            border: 4px solid var(--neon-magenta);
            box-shadow: 0 0 40px var(--neon-violet);
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            position: relative;
        }

        .info-header {
            font-size: 3.2rem;
            font-style: italic;
            color: #fff;
            text-shadow: 4px 4px 0px var(--neon-violet);
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .info-body {
            font-family: sans-serif;
            font-size: 1.1rem;
            line-height: 1.8;
            letter-spacing: 1px;
            color: #dcbfff;
            margin-bottom: 40px;
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-left: 5px solid var(--neon-magenta);
        }

        .close-panel-btn {
            background: transparent;
            border: 2px solid #555;
            color: #aaa;
            padding: 10px 25px;
            font-family: var(--font-display);
            font-size: 1.3rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .close-panel-btn:hover {
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 15px #fff;
        }

        /* --- PHYSICS LAYER ANIMATIONS --- */
        @keyframes rotateOrbit {
            100% { transform: rotate(360deg); }
        }

        @keyframes bypassDrift {
            0% { background-position: 0 0; }
            100% { background-position: 120px 120px; }
        }

        @keyframes pulseVortex {
            0% { transform: scale(1); box-shadow: 0 0 60px 10px var(--neon-violet), 0 0 100px 30px var(--neon-magenta); }
            100% { transform: scale(1.06); box-shadow: 0 0 80px 25px var(--neon-violet), 0 0 140px 50px var(--neon-magenta); }
        }

        @keyframes flashWarning {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        @keyframes titlesway {
            0% { transform: rotate(-1deg) scale(1); }
            100% { transform: rotate(2deg) scale(1.03); }
        }
    </style>
</head>
<body>

    <div class="void-canvas">
        <div class="void-debris"></div>
        <div class="chromatic-static"></div>
    </div>

    <!-- STAGE 1: INITIAL SYSTEM LOADING SCREEN -->
    <div id="loadingStage" class="stage">
        <div class="loading-vortex">
            <span class="percent-counter" id="loadPercent">0%</span>
        </div>
        <div class="loading-subtext">CORE_BREACH_IN_PROGRESS</div>
    </div>

    <!-- STAGE 2: HYPER VOID ACCESS MENU -->
    <div id="menuStage" class="stage collapsed">
        <h1 class="void-title-banner">Void Singularity</h1>
        <div class="button-cluster">
            <button class="void-btn" onclick="revealModule('codm')">CODM</button>
            <button class="void-btn" onclick="revealModule('fnf')">FNF</button>
        </div>
    </div>

    <!-- STAGE 3: SPECIFIC DATA MODULE DISPLAY -->
    <div id="infoStage" class="stage collapsed">
        <div class="info-panel">
            <h2 id="panelHeader" class="info-header">MODULE DATA</h2>
            <div id="panelBody" class="info-body">Loading decryption blocks...</div>
            <button class="close-panel-btn" onclick="hideModule()">[ DISCONNECT ]</button>
        </div>
    </div>

    <script>
        // Automatic Simulated Count Up Engine
        window.addEventListener('DOMContentLoaded', () => {
            const counter = document.getElementById('loadPercent');
            let currentPercentage = 0;

            const progressInterval = setInterval(() => {
                currentPercentage += Math.floor(Math.random() * 8) + 2; // Chaotic loading leaps
                if (currentPercentage >= 100) {
                    currentPercentage = 100;
                    clearInterval(progressInterval);
                    
                    // Exit Loader -> Drop into Menu
                    setTimeout(() => {
                        document.getElementById('loadingStage').classList.add('collapsed');
                        document.getElementById('menuStage').classList.remove('collapsed');
                    }, 500);
                }
                counter.innerText = currentPercentage + "%";
            }, 80);
        });

        // Open Individual Profile Nodes
        function revealModule(gameType) {
            document.getElementById('menuStage').classList.add('collapsed');
            document.getElementById('infoStage').classList.remove('collapsed');

            const pHeader = document.getElementById('panelHeader');
            const pBody = document.getElementById('panelBody');

            if (gameType === 'codm') {
                pHeader.innerText = "CODM // BLACKOUT CORRUPTION";
                pBody.innerHTML = "<strong>CRITICAL TELEMETRY RECORDED:</strong><br><br>• Spatial distortion detected across isolated military combat zones.<br>• Weapon tracking architectures experiencing high frequency system noise and void residue contamination.<br>• Kinetic targeting operations parameters are collapsing directly into local gravitational thresholds.";
            } else if (gameType === 'fnf') {
                pHeader.innerText = "FNF // CHRONO EXPULSION";
                pBody.innerHTML = "<strong>SPECTRUM AUDIO OVERRIDE:</strong><br><br>• Vocal tracking vectors intercepted by custom deep space entity matrices.<br>• Directional arrows undergoing spatial breakdown, resulting in heavy localized sync distortions.<br>• Acoustic waveforms show dangerous spikes of dark matter conversion within standard rhythm protocols.";
            }
        }

        function hideModule() {
            document.getElementById('infoStage').classList.add('collapsed');
            document.getElementById('menuStage').classList.remove('collapsed');
        }
    </script>
</body>
</html>
