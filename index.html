<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVIAN(JONASH) // MULTI-SINGULARITY</title>
    <style>
        :root {
            --space-black: #010002;
            --void-core: #000000;
            --accretion-hot: #ff5500;
            --accretion-warm: #bc00dd;
            --neon-cyan: #00f0ff;
            --font-display: 'Impact', 'Arial Black', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--space-black);
            font-family: var(--font-display);
            color: #fff;
        }

        /* --- HARDWARE ACCELERATED BACKDROP --- */
        .universe-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #0f021c 0%, var(--space-black) 100%);
            z-index: 1;
            overflow: hidden;
            will-change: transform;
        }

        .starfield {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                radial-gradient(rgba(0, 240, 255, 0.08) 2px, transparent 2px);
            background-size: 70px 70px, 150px 150px;
            transform: translate3d(0,0,0);
            animation: backgroundDrift 60s linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        /* --- STAGE MANAGEMENT --- */
        .viewport-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            transition: opacity 0.7s cubic-bezier(0.25, 1, 0.5, 1), transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* --- REALISTIC MASSIVE BLACK HOLE --- */
        .black-hole-viewport {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate3d(-50%, -50%, 0);
            width: 85vmin; height: 85vmin;
            max-width: 580px; max-height: 580px;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.2, 1), filter 1.2s ease;
            will-change: transform;
        }

        /* Realistic Relativistic Beaming Accretion Disk (Asymmetric, lopsided hot-spot) */
        .accretion-lens-disk {
            position: absolute;
            width: 100%; height: 75%; /* Flattened structural profile */
            border-radius: 50%;
            background: radial-gradient(ellipse at center, transparent 30%, var(--accretion-hot) 42%, var(--accretion-warm) 55%, transparent 70%);
            filter: blur(12px) contrast(1.4);
            transform: rotate(-12deg);
            opacity: 0.85;
            z-index: 4;
            /* Creates the Doppler hot-side look */
            mask-image: linear-gradient(90deg, #000 35%, rgba(0,0,0,0.1) 100%);
            -webkit-mask-image: linear-gradient(90deg, #000 35%, rgba(0,0,0,0.1) 100%);
            animation: fluxBurner 4s ease-in-out infinite alternate;
        }

        /* The Gravitational Lensing Halo (Light wrapping around the back) */
        .gravitational-lensing-halo {
            position: absolute;
            width: 65%; height: 65%;
            border-radius: 50%;
            box-shadow: 0 0 45px 15px var(--accretion-hot), 0 0 90px 30px rgba(188, 0, 221, 0.3);
            filter: blur(8px);
            z-index: 3;
            animation: orbitSpin 25s linear infinite;
        }

        /* Perfectly Sharp Event Horizon Core */
        .shadow-core {
            width: 40%; height: 40%;
            background: var(--void-core);
            border-radius: 50%;
            z-index: 6;
            box-shadow: 0 0 30px #000, inset 0 0 40px #000;
        }

        /* --- STAGE 1: LOADING TIMELINE --- */
        .loading-title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 25px;
            text-shadow: 0 0 15px var(--accretion-hot);
        }

        .bar-container {
            width: min(85vw, 450px);
            height: 12px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--accretion-warm);
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--accretion-warm), var(--accretion-hot));
            box-shadow: 0 0 12px var(--accretion-hot);
            transition: width 0.1s linear;
        }

        .percentage-display {
            font-family: monospace;
            font-size: 1.6rem;
            margin-top: 15px;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 8px var(--accretion-hot);
        }

        /* --- STAGE 2: MENU & LIGHTNING TYPOGRAPHY --- */
        .system-branding {
            font-size: clamp(2.3rem, 6.5vw, 5.5rem);
            font-style: italic;
            text-transform: uppercase;
            margin-bottom: clamp(40px, 8vh, 70px);
            position: relative;
            display: inline-block;
        }

        .system-branding .left-half {
            color: #fff;
            text-shadow: 3px 3px 0px #000, 0 0 25px var(--accretion-warm);
            padding-right: 3px;
        }

        .system-branding .right-half {
            color: #fff;
            text-shadow: 3px 3px 0px #000, 0 0 25px var(--neon-cyan);
            padding-left: 3px;
        }

        .system-branding::after {
            content: '⚡';
            font-size: 0.8em;
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotate(12deg);
            color: #fff;
            text-shadow: 0 0 15px #fff, 0 0 25px var(--neon-cyan);
        }

        .action-cluster {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: min(90vw, 360px);
        }

        .interactive-node {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: 2px solid rgba(255, 85, 0, 0.4);
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-style: italic;
            text-transform: uppercase;
            padding: 15px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            -webkit-tap-highlight-color: transparent;
        }

        .interactive-node:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: scale(1.05);
        }

        /* --- STAGE 3: UNKNOWN MULTI-SINGULARITY MULTIVERSE SPACE --- */
        .multiverse-grid {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 2;
            pointer-events: none;
            display: flex;
            justify-content: space-around;
            align-items: center;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .multiverse-active { opacity: 1 !important; }

        /* Floating background singularities */
        .mini-singularity {
            position: absolute;
            width: 25vmin; height: 25vmin;
            background: #000;
            border-radius: 50%;
            box-shadow: 0 0 25px var(--accretion-hot), 0 0 50px var(--accretion-warm);
            animation: floatDrift 8s ease-in-out infinite alternate;
            filter: blur(1px);
        }

        .data-vault-panel {
            width: min(92vw, 760px);
            background: rgba(0, 0, 0, 0.94);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.2);
            padding: clamp(20px, 5vw, 40px);
            border-radius: 8px;
            z-index: 15;
            display: flex;
            flex-direction: column;
        }

        .vault-title {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-style: italic;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--accretion-warm);
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }

        .vault-body {
            font-family: sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            line-height: 1.7;
            color: #d1c7de;
            margin-bottom: 30px;
        }

        .vault-close-btn {
            background: transparent;
            border: 2px solid var(--accretion-hot);
            color: #fff;
            padding: 12px 30px;
            font-family: var(--font-display);
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            align-self: center;
        }

        .vault-close-btn:hover {
            background: var(--accretion-hot);
            box-shadow: 0 0 15px var(--accretion-hot);
        }

        /* --- CONSUMPTION EFFECT ANIMATIONS --- */
        .swallowed-by-singularity {
            transform: translate3d(-50%, -50%, 0) scale(6) !important;
            filter: blur(8px) brightness(0.2);
        }

        .menu-spaghettify {
            transform: scale(0.4) rotate(-5deg);
            filter: blur(20px);
            opacity: 0;
        }

        /* --- HIGH PERFORMANCE ACCELERATED ANIMATIONS --- */
        @keyframes backgroundDrift {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-40px, -40px, 0); }
        }

        @keyframes orbitSpin {
            100% { transform: rotate(360deg); }
        }

        @keyframes fluxBurner {
            0% { filter: blur(12px) contrast(1.3); transform: rotate(-12deg) scale(1); }
            100% { filter: blur(14px) contrast(1.5); transform: rotate(-10deg) scale(1.04); }
        }

        @keyframes floatDrift {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-20px) scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="universe-bg">
        <div class="starfield"></div>
        
        <div class="black-hole-viewport" id="mainBlackHole">
            <div class="gravitational-lensing-halo"></div>
            <div class="accretion-lens-disk"></div>
            <div class="shadow-core"></div>
        </div>

        <div class="multiverse-grid" id="multiverseField">
            <div class="mini-singularity" style="top: 15%; left: 10%; animation-delay: 0s; width: 15vmin; height: 15vmin;"></div>
            <div class="mini-singularity" style="top: 70%; left: 15%; animation-delay: -2s; width: 28vmin; height: 28vmin;"></div>
            <div class="mini-singularity" style="top: 20%; right: 12%; animation-delay: -4s; width: 22vmin; height: 22vmin;"></div>
            <div class="mini-singularity" style="top: 65%; right: 8%; animation-delay: -1s; width: 18vmin; height: 18vmin;"></div>
        </div>
    </div>

    <div id="loaderStage" class="viewport-stage">
        <h2 class="loading-title">Acquiring Horizon</h2>
        <div class="bar-container">
            <div class="bar-fill" id="progressBar"></div>
        </div>
        <div class="percentage-display" id="progressText">0%</div>
    </div>

    <div id="menuStage" class="viewport-stage hidden">
        <h1 class="system-branding">
            <span class="left-half">VIVIAN</span><span class="right-half">(JONASH)</span>
        </h1>
        <div class="action-cluster">
            <button class="interactive-node" onclick="swallowSequence('codm')">CODM</button>
            <button class="interactive-node" onclick="swallowSequence('fnf')">FNF</button>
        </div>
    </div>

    <div id="vaultStage" class="viewport-stage hidden">
        <div class="data-vault-panel">
            <h2 class="vault-title" id="vaultHeader">UNKNOWN DATA LAYER</h2>
            <div class="vault-body" id="vaultContent">[DECRYPTING...]</div>
            <button class="vault-close-btn" onclick="restoreFromUnknown()">[ RETURN TO ORBIT ]</button>
        </div>
    </div>

    <script>
        // Smooth Loading Counter
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progressBar');
            const txt = document.getElementById('progressText');
            let count = 0;

            const engine = setInterval(() => {
                count += Math.floor(Math.random() * 4) + 2;
                if (count >= 100) {
                    count = 100;
                    clearInterval(engine);
                    setTimeout(() => {
                        document.getElementById('loaderStage').classList.add('hidden');
                        document.getElementById('menuStage').classList.remove('hidden');
                    }, 400);
                }
                bar.style.width = count + "%";
                txt.innerText = count + "%";
            }, 40);
        });

        // The Cinematic "Swallow & Enter Unknown Space" Execution Loop
        function swallowSequence(gameId) {
            const bh = document.getElementById('mainBlackHole');
            const menu = document.getElementById('menuStage');
            const vault = document.getElementById('vaultStage');
            const fields = document.getElementById('multiverseField');
            
            const head = document.getElementById('vaultHeader');
            const body = document.getElementById('vaultContent');

            if (gameId === 'codm') {
                head.innerText = "CODM // INTERSECTED TELEMETRY";
                body.innerHTML = "Isolated sector files pulled down into the multi-singularity grid network. System targeting configurations successfully modified by background distortion fields.";
            } else if (gameId === 'fnf') {
                head.innerText = "FNF // CHRONO RESIDUE";
                body.innerHTML = "Audio frequency tracking intercepts completed. Local signal vectors have fragmented across multiple event-horizon spatial planes.";
            }

            // Swallow animation trigger
            bh.classList.add('swallowed-by-singularity');
            menu.classList.add('menu-spaghettify');

            setTimeout(() => {
                menu.classList.add('hidden');
                bh.classList.add('hidden'); // Hide the main black hole to emphasize new space
                
                vault.classList.remove('hidden');
                fields.classList.add('multiverse-active'); // Turn on background fields
            }, 900);
        }

        // Return transition back to the main stable view matrix
        function restoreFromUnknown() {
            const bh = document.getElementById('mainBlackHole');
            const menu = document.getElementById('menuStage');
            const vault = document.getElementById('vaultStage');
            const fields = document.getElementById('multiverseField');

            vault.classList.add('hidden');
            fields.classList.remove('multiverse-active');
            
            bh.classList.remove('hidden');
            menu.classList.remove('hidden');

            setTimeout(() => {
                bh.classList.remove('swallowed-by-singularity');
                menu.classList.remove('menu-spaghettify');
            }, 40);
        }
    </script>
</body>
</html>
